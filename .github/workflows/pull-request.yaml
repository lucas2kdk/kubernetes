name: PR

# Gate every pull request to main. Five independent checks, all runnable
# locally via `just check`:
#   validate   — build each kustomization the way Flux does + kubeconform schemas
#   policy     — evaluate the Kyverno ClusterPolicies against the rendered manifests
#   namespaces — guard the four platform-namespace exclusion lists are in lockstep
#   secrets    — scan the tree for committed secrets (gitleaks)
#   lint       — lint these workflow files (actionlint)
on:
  pull_request:
    branches: ["main"]

# Least privilege: these checks only read the tree, no write scopes granted.
permissions:
  contents: read

# One in-flight run per branch; a new push cancels the superseded run so the PR
# isn't gated on stale commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Tool versions are pinned here (not in the composite action) so Renovate's
# regex manager can see and bump them via the `# renovate:` annotations; the
# setup-tools action receives them as inputs. Keep the annotation directly above
# each var — that comment is what Renovate matches on.
env:
  # renovate: datasource=github-releases depName=kubernetes-sigs/kustomize extractVersion=^kustomize/v(?<version>.+)$
  KUSTOMIZE_VERSION: "5.8.1"
  # renovate: datasource=github-releases depName=yannh/kubeconform extractVersion=^v(?<version>.+)$
  KUBECONFORM_VERSION: "0.8.0"
  # renovate: datasource=github-releases depName=kyverno/kyverno extractVersion=^v(?<version>.+)$
  KYVERNO_VERSION: "1.18.1"
  # renovate: datasource=github-releases depName=gitleaks/gitleaks extractVersion=^v(?<version>.+)$
  GITLEAKS_VERSION: "8.30.1"
  # renovate: datasource=github-releases depName=rhysd/actionlint extractVersion=^v(?<version>.+)$
  ACTIONLINT_VERSION: "1.7.12"

# Each check is its own job so they run in parallel and a failure points at one
# check. Every job installs only the tools it needs via the shared composite
# action (./.github/actions/setup-tools) — one place to define the pinned
# install steps instead of repeating curl blocks per job.
jobs:
  # Schema validation: build each kustomization + kubeconform (just validate).
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install tools
        uses: ./.github/actions/setup-tools
        with:
          kustomize: ${{ env.KUSTOMIZE_VERSION }}
          kubeconform: ${{ env.KUBECONFORM_VERSION }}

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Validate manifests
        run: just validate

  # Kyverno policy evaluation + unit tests (just policy).
  policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install tools
        uses: ./.github/actions/setup-tools
        with:
          kustomize: ${{ env.KUSTOMIZE_VERSION }}
          kyverno: ${{ env.KYVERNO_VERSION }}

      # policy-check.sh parses rendered YAML with python3 + PyYAML.
      - name: Install PyYAML
        run: pip install --quiet pyyaml

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Evaluate policies
        run: just policy

  # Committed-secret scan of the working tree (just secrets / gitleaks).
  secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install tools
        uses: ./.github/actions/setup-tools
        with:
          gitleaks: ${{ env.GITLEAKS_VERSION }}

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Scan for secrets
        run: just secrets

  # Platform-namespace exclusion-list drift guard (just namespaces).
  # No setup-tools step: the script only needs yq/python3, preinstalled on the runner.
  namespaces:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Check namespace exclusion lists
        run: just namespaces

  # Lint these workflow files themselves (just lint / actionlint).
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install tools
        uses: ./.github/actions/setup-tools
        with:
          actionlint: ${{ env.ACTIONLINT_VERSION }}

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Lint workflows
        run: just lint
