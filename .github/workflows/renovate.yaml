name: Renovate

on:
  # Manual trigger from the Actions tab. dryRun lets you preview without
  # opening PRs.
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Renovate log level"
        required: false
        default: "info"
        type: choice
        options: ["debug", "info", "warn"]
      dryRun:
        description: "Run without creating branches/PRs"
        required: false
        default: false
        type: boolean
  # Self-scheduled. The actual update cadence is controlled by the `schedule`
  # field in renovate.json; this just wakes Renovate up often enough to honour
  # it.
  schedule:
    - cron: "0 * * * *"

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Renovate
        uses: renovatebot/github-action@v46.1.15
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
          RENOVATE_DRY_RUN: ${{ inputs.dryRun && 'full' || '' }}
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_PLATFORM: github
          # Use the repo's renovate.json instead of an org preset.
          RENOVATE_ONBOARDING: "false"
          RENOVATE_REQUIRE_CONFIG: "required"
