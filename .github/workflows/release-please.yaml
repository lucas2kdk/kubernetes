name: Release Please

# Creates and maintains the release PR that accumulates the changelog and
# computes the next SemVer. Merging that PR is the gate that cuts a release
# and pushes the platform/vX.Y.Z tag, which triggers the OCI push in release.yaml.
on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
