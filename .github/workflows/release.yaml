name: Release

# Fires when release-please merges a release PR and creates a platform/vX.Y.Z tag.
# Renders the platform/ directory, injects the version into platform-meta, and
# pushes an immutable OCI artifact to the self-hosted registry oci.rosenvold.tech.
on:
  push:
    tags:
      - "platform/v*"
  # Manual re-publish. Needed because release-please creates the tag with the
  # default GITHUB_TOKEN, and GitHub suppresses workflow triggers for events
  # made by that token — so the push-tag trigger above never fires for an
  # automated release. Dispatch this with the tag to (re)push its OCI artifact.
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to (re)publish, e.g. platform/v1.0.0"
        required: true

permissions:
  contents: read
  packages: write

env:
  OCI_IMAGE: oci.rosenvold.tech/platform
  # renovate: datasource=github-releases depName=fluxcd/flux2 extractVersion=^v(?<version>.+)$
  FLUX_VERSION: "2.8.8"

jobs:
  push-artifact:
    runs-on: ubuntu-latest
    steps:
      # On push the ref is the tag; on manual dispatch take it from the input.
      - name: Resolve release ref
        id: version
        run: |
          ref="${{ github.event.inputs.tag || github.ref_name }}"
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"
          echo "version=${ref#platform/v}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.version.outputs.ref }}

      - name: Install flux CLI
        run: |
          curl -sSL "https://github.com/fluxcd/flux2/releases/download/v${FLUX_VERSION}/flux_${FLUX_VERSION}_linux_amd64.tar.gz" \
            | tar -xz flux
          sudo mv flux /usr/local/bin/flux

      - name: Inject version into platform-meta ConfigMap
        run: |
          sed -i "s/version: \"0\.0\.0\"/version: \"${{ steps.version.outputs.version }}\"/" \
            platform/base/platform-meta/platform-version.yaml

      # Self-hosted registry: push needs the pusher credentials (repo secrets).
      # Pull is anonymous, so the cluster OCIRepository carries no secretRef.
      - name: Log in to oci.rosenvold.tech
        run: echo "${{ secrets.PUSHER_PASSWORD }}" | docker login oci.rosenvold.tech --username "${{ secrets.PUSHER_USERNAME }}" --password-stdin

      - name: Push OCI artifact
        run: |
          flux push artifact \
            "oci://${OCI_IMAGE}:${{ steps.version.outputs.version }}" \
            --path=./platform \
            --source="https://github.com/${{ github.repository }}.git" \
            --revision="${{ steps.version.outputs.ref }}@sha1:$(git rev-parse HEAD)"
