# Fixtures for the Kyverno policy unit tests (see kyverno-test.yaml).
#
# The rendered GitOps tree contains almost no in-scope workloads — every chart's
# pods are expanded by Helm at install time, and the only source-tree Deployment
# (tsidp) sits in a platform-excluded namespace. So `policy-check.sh` alone never
# actually exercises the pod-governing ClusterPolicies. These hand-written
# fixtures do: a known-good pod that must pass every rule, a known-bad pod that
# must trip each one, the same bad pod in a platform.io/managed namespace that
# must be skipped (guards the namespace-exclusion dedup), and a default-namespace
# pod for disallow-default-namespace.
---
# In-scope tenant namespace: no platform.io/managed label, not a system ns.
apiVersion: v1
kind: Namespace
metadata:
  name: tenant-app
---
# Platform-managed namespace: carries the label, so the pod policies exclude it.
apiVersion: v1
kind: Namespace
metadata:
  name: platform-thing
  labels:
    platform.io/managed: "true"
---
# Compliant pod in a tenant namespace — must PASS every rule.
apiVersion: v1
kind: Pod
metadata:
  name: good-pod
  namespace: tenant-app
spec:
  containers:
    - name: app
      image: nginx:1.27.2
      livenessProbe:
        httpGet:
          path: /
          port: 80
        periodSeconds: 10
      readinessProbe:
        httpGet:
          path: /
          port: 80
        periodSeconds: 10
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
---
# Violating pod in a tenant namespace — must FAIL latest-tag / probes /
# requests / pod-security-baseline (in-scope, so all rules apply).
apiVersion: v1
kind: Pod
metadata:
  name: bad-pod
  namespace: tenant-app
spec:
  hostNetwork: true
  containers:
    - name: app
      image: nginx:latest
      securityContext:
        privileged: true
---
# Tagless image in a tenant namespace — must FAIL require-image-tag (no tag at
# all) while PASSING validate-image-tag (no ':latest'). Covers the other half of
# disallow-latest-tag, which the :latest bad-pod above doesn't exercise.
apiVersion: v1
kind: Pod
metadata:
  name: untagged-pod
  namespace: tenant-app
spec:
  containers:
    - name: app
      image: nginx
      livenessProbe:
        httpGet:
          path: /
          port: 80
        periodSeconds: 10
      readinessProbe:
        httpGet:
          path: /
          port: 80
        periodSeconds: 10
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
---
# Same violations, but in a platform.io/managed namespace — every pod policy
# must SKIP it. This is the regression guard for the namespaceSelector dedup.
apiVersion: v1
kind: Pod
metadata:
  name: excluded-pod
  namespace: platform-thing
spec:
  hostNetwork: true
  containers:
    - name: app
      image: nginx:latest
      securityContext:
        privileged: true
---
---
# Pod with ONLY securityContext.privileged: true — tests baseline isolation of
# this one field. A policy bug that ignores privileged in containers[] would
# allow this through while bad-pod (multi-violation) still fails.
apiVersion: v1
kind: Pod
metadata:
  name: privileged-pod
  namespace: tenant-app
spec:
  containers:
    - name: app
      image: nginx:1.27.2
      securityContext:
        privileged: true
---
# Pod with ONLY hostNetwork: true.
apiVersion: v1
kind: Pod
metadata:
  name: hostnetwork-pod
  namespace: tenant-app
spec:
  hostNetwork: true
  containers:
    - name: app
      image: nginx:1.27.2
---
# Pod with ONLY hostPID: true.
apiVersion: v1
kind: Pod
metadata:
  name: hostpid-pod
  namespace: tenant-app
spec:
  hostPID: true
  containers:
    - name: app
      image: nginx:1.27.2
---
# Pod with ONLY allowPrivilegeEscalation: true — tests restricted profile.
apiVersion: v1
kind: Pod
metadata:
  name: privesc-pod
  namespace: tenant-app
spec:
  containers:
    - name: app
      image: nginx:1.27.2
      securityContext:
        allowPrivilegeEscalation: true
---
# Pod with an initContainer carrying privileged: true — tests that the policy
# checks initContainers[], not just containers[].
apiVersion: v1
kind: Pod
metadata:
  name: init-privileged-pod
  namespace: tenant-app
spec:
  initContainers:
    - name: init
      image: nginx:1.27.2
      securityContext:
        privileged: true
  containers:
    - name: app
      image: nginx:1.27.2
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      livenessProbe:
        httpGet:
          path: /
          port: 80
        periodSeconds: 10
      readinessProbe:
        httpGet:
          path: /
          port: 80
        periodSeconds: 10
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
---
# Pod in the default namespace — must FAIL disallow-default-namespace.
apiVersion: v1
kind: Pod
metadata:
  name: default-ns-pod
  namespace: default
spec:
  containers:
    - name: app
      image: nginx:1.27.2
      livenessProbe:
        httpGet:
          path: /
          port: 80
        periodSeconds: 10
      readinessProbe:
        httpGet:
          path: /
          port: 80
        periodSeconds: 10
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
---
# Tenant Certificate referencing the cluster-wide ClusterIssuer — must FAIL
# restrict-clusterissuer (a tenant could mint a cert for any zone host).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: tenant-cert-clusterissuer
  namespace: tenant-app
spec:
  secretName: tenant-cert-tls
  dnsNames: ["app.rosenvold.tech"]
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-production
---
# Tenant Certificate using a namespaced Issuer — must PASS.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: tenant-cert-issuer
  namespace: tenant-app
spec:
  secretName: tenant-cert2-tls
  dnsNames: ["app.rosenvold.tech"]
  issuerRef:
    kind: Issuer
    name: tenant-ca
---
# Same ClusterIssuer reference but in a platform.io/managed namespace — SKIP
# (platform components legitimately use the ClusterIssuer).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: platform-cert-clusterissuer
  namespace: platform-thing
spec:
  secretName: platform-cert-tls
  dnsNames: ["grafana.rosenvold.tech"]
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-production
---
# add-seccomp-runtime-default fixtures.
# Pod with no seccompProfile in a non-excluded namespace — the mutate must add
# pod-level RuntimeDefault (see seccomp-target-pod.patched.yaml).
apiVersion: v1
kind: Pod
metadata:
  name: seccomp-target-pod
  namespace: tenant-app
spec:
  containers:
    - name: app
      image: nginx:1.27.2
---
# Same pod in flux-system — excluded by name, so the mutate must SKIP it
# (bootstrap webhook-deadlock guard).
apiVersion: v1
kind: Pod
metadata:
  name: seccomp-fluxsystem-pod
  namespace: flux-system
spec:
  containers:
    - name: app
      image: nginx:1.27.2
