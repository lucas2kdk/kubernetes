apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: flux-multi-tenancy
spec:
  validationFailureAction: Enforce
  rules:
    - name: serviceAccountName
      exclude:
        any:
          - resources:
              namespaces:
                - flux-system
      match:
        any:
          - resources:
              kinds:
                - Kustomization
                - HelmRelease
      validate:
        message: ".spec.serviceAccountName is required"
        pattern:
          spec:
            serviceAccountName: "?*"
    - name: sourceRefNamespace
      exclude:
        any:
          - resources:
              namespaces:
                - flux-system
      match:
        any:
          - resources:
              kinds:
                - Kustomization
                - HelmRelease
      preconditions:
        any:
          - key: "{{ request.object.spec.sourceRef.namespace }}"
            operator: NotEquals
            value: ""
      validate:
        message: "spec.sourceRef.namespace must be the same as metadata.namespace"
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.sourceRef.namespace }}"
                operator: NotEquals
                value: "{{ request.object.metadata.namespace }}"
