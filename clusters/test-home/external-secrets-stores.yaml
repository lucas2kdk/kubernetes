# test-home overrides the shared fleet external-secrets-stores: home-LAN apiserver can't serve Vault TokenReview callbacks, so this uses AppRole auth (structural diff -> overlay, not a substitution var).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-stores
  namespace: flux-system
spec:
  dependsOn:
    - name: external-secrets
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  sourceRef:
    kind: OCIRepository
    name: platform
  path: ./overlays/test-home/external-secrets-stores
  prune: true
  wait: true
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
