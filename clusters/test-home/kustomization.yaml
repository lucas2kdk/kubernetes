# test-home runs a subset of the fleet (external-secrets, tailscale-operator) plus its own AppRole external-secrets-stores override.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - flux-system
  - cluster-vars.yaml
  - ../../platform/fleet/capacitor.yaml
  - ../../platform/fleet/external-secrets.yaml
  - ../../platform/fleet/tailscale-operator.yaml
  - external-secrets-stores.yaml
  - tenants.yaml
patches:
  - path: ../../platform/fleet/_defaults.yaml
    target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
