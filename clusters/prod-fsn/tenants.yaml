# Per-cluster tenants Flux Kustomization for prod-fsn. Tenants reconcile from
# tenants/overlays/<cluster>; because a Flux Kustomization's spec.path can't be
# ${var}-substituted, this CR is kept per cluster rather than in platform/fleet/.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tenants
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./tenants/overlays/prod-fsn
  prune: true
  wait: true # block dependents until tenant apps are Ready
