# prod-fsn runs the full fleet. Components are defined once in platform/fleet/; this lists what prod-fsn runs plus its per-cluster files (cluster-vars, tenants).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - flux-system # Flux bootstrap (GitRepository + flux-system Kustomization); generated, do not hand-edit
  - cluster-vars.yaml # cluster_name=prod-fsn, substituted into base ${cluster_name} tokens
  - platform-source.yaml # OCIRepository pinning the versioned platform artifact
  - ../../platform/fleet/fleet-vars.yaml # fleet-wide ${tailnet}; referenced directly, not part of platform/fleet aggregate
  - tenants.yaml # per-cluster tenants Kustomization (spec.path can't be substituted, so it lives here not in fleet/)
  - ../../platform/fleet # the whole reconcile graph (all components + dependsOn), referenced not copied

# Redirect just the kube-prometheus-stack CR (defined once in the fleet) to the
# prod-fsn overlay, which adds the cross-cluster federation pull of test-home's
# Prometheus. spec.path can't be substituted, so it's patched here; the fleet
# CR's fleet-vars substituteFrom (for ${tailnet}) is preserved.
patches:
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: kube-prometheus-stack
    patch: |
      - op: replace
        path: /spec/path
        value: ./overlays/prod-fsn/kube-prometheus-stack
