apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-stores
  namespace: flux-system
spec:
  path: ./platform/base/external-secrets-stores
  dependsOn:
    - name: external-secrets
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
