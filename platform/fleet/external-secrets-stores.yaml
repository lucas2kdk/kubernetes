# The Vault ClusterSecretStore — the gate every Vault-synced secret waits on.
# (test-home does NOT use this file; it has its own AppRole override CR at
# clusters/test-home/external-secrets-stores.yaml.)
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-stores
  namespace: flux-system
spec:
  path: ./base/external-secrets-stores
  dependsOn:
    # ClusterSecretStore is an ESO CRD — the controller must be installed first.
    - name: external-secrets
  postBuild:
    substituteFrom:
      # ${cluster_name} -> Vault mountPath kubernetes/${cluster_name}.
      - kind: ConfigMap
        name: cluster-vars
