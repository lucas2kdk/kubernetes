# Kyverno admission controller (policy engine). Roots its policies/reporter.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kyverno
  namespace: flux-system
spec:
  path: ./base/kyverno
  dependsOn:
    # Ships ServiceMonitors, which need the Prometheus-Operator CRDs to exist first.
    - name: kube-prometheus-stack
