# Redis operator. Provides the redis.redis.opstreelabs.in CRDs that tenants use
# to declare their own Redis. Webhook disabled, so no cert-manager dependsOn.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: redis-operator
  namespace: flux-system
spec:
  path: ./base/redis-operator
