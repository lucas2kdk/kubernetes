# Policy Reporter + web UI — aggregates Kyverno PolicyReports for viewing.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: policy-reporter
  namespace: flux-system
spec:
  path: ./platform/base/policy-reporter
  dependsOn:
    # Consumes the PolicyReport CRs Kyverno produces, so Kyverno comes first.
    - name: kyverno
