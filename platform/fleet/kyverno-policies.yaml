# The ClusterPolicy set (flux-multi-tenancy guardrail, pod rules, baseline netpol).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kyverno-policies
  namespace: flux-system
spec:
  path: ./platform/base/policies
  dependsOn:
    # ClusterPolicy is a Kyverno CRD — the controller must be installed first.
    - name: kyverno
