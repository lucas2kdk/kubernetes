# Trivy operator — weekly CIS benchmark + vuln/config-audit/RBAC scan reports.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: trivy-operator
  namespace: flux-system
spec:
  path: ./base/trivy-operator
  dependsOn:
    # Ships a ServiceMonitor, which needs the Prometheus-Operator CRDs first.
    - name: kube-prometheus-stack
