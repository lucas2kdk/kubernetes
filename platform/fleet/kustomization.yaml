# The fleet: every platform component's Flux Kustomization, defined once. A cluster opts in by referencing this whole directory or individual files. Per-cluster values come from each cluster's cluster-vars ConfigMap via postBuild substitution.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - capacitor.yaml
  - platform-meta.yaml
  - cert-manager-issuers.yaml
  - cert-manager.yaml
  - external-secrets-stores.yaml
  - external-secrets.yaml
  - headlamp.yaml
  - kube-prometheus-stack.yaml
  - kyverno-policies.yaml
  - kyverno.yaml
  - monitoring-extras.yaml
  - network-policies.yaml
  - policy-reporter.yaml
  - tailscale-operator.yaml
  - traefik.yaml
  - trivy-operator.yaml
  - tsidp.yaml
# Apply the shared spec defaults (interval/sourceRef/prune/wait/…) onto every
# component Kustomization above, so each file only declares what differs.
patches:
  - path: _defaults.yaml
    target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
