# Headlamp dashboard (tsidp-OIDC login, reached over the tailnet).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: headlamp
  namespace: flux-system
spec:
  path: ./base/headlamp
  dependsOn:
    # Reads its OIDC client secret from Vault, so the store must exist first.
    - name: external-secrets-stores
  postBuild:
    substituteFrom:
      # ${tailnet} -> the OIDC issuer hostname (idp.<tailnet>.ts.net).
      - kind: ConfigMap
        name: fleet-vars
