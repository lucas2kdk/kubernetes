apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: headlamp
  namespace: flux-system
spec:
  path: ./platform/base/headlamp
  dependsOn:
    - name: external-secrets-stores
  postBuild:
    substituteFrom:
      # ${tailnet} -> the OIDC issuer hostname (idp.<tailnet>.ts.net).
      - kind: ConfigMap
        name: fleet-vars
