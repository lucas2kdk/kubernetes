# cert-manager controller. Roots the issuers and is a prerequisite for traefik.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  path: ./platform/base/cert-manager
  dependsOn:
    # Ships a ServiceMonitor, which needs the Prometheus-Operator CRDs first.
    - name: kube-prometheus-stack
