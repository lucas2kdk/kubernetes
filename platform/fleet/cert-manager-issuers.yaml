# Let's Encrypt ClusterIssuers (DNS-01) + the ESO-synced Cloudflare API token.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager-issuers
  namespace: flux-system
spec:
  path: ./base/cert-manager-issuers
  dependsOn:
    # ClusterIssuer is a cert-manager CRD — controller must be up first. With
    # wait:true (from _defaults) this only reads Ready once issuers register
    # with ACME.
    - name: cert-manager
    # The Cloudflare token is a Vault-synced secret, so the ClusterSecretStore
    # must exist before the ExternalSecret here can resolve.
    - name: external-secrets-stores
