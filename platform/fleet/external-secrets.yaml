# External Secrets Operator (ESO → Vault). A reconcile root (no dependsOn);
# installs the ESO controller + CRDs that the secret stores and every
# Vault-backed secret consumer build on.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets
  namespace: flux-system
spec:
  path: ./platform/base/external-secrets
