# Monitoring extras (Alertmanager routing + platform alert rules, ServiceMonitors).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: monitoring-extras
  namespace: flux-system
spec:
  path: ./base/monitoring-extras
  dependsOn:
    # Ships ServiceMonitors/PrometheusRules — needs the Prometheus-Operator CRDs first.
    - name: kube-prometheus-stack
