apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tsidp
  namespace: flux-system
spec:
  dependsOn:
    - name: external-secrets-stores
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./platform/base/tsidp
  prune: true
  wait: true
