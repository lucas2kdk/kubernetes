# tsidp — Tailscale OIDC identity provider (the issuer behind Headlamp/Grafana logins).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tsidp
  namespace: flux-system
spec:
  path: ./platform/base/tsidp
  dependsOn:
    # Reads its tailnet auth secret from Vault, so the store must exist first.
    - name: external-secrets-stores
