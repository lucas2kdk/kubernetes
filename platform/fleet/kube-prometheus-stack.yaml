# Prometheus + Grafana stack. A reconcile root (no dependsOn): it installs the
# Prometheus-Operator ServiceMonitor/PodMonitor CRDs that kyverno, cert-manager,
# trivy-operator and monitoring-extras all wait on — hence it reconciles first.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kube-prometheus-stack
  namespace: flux-system
spec:
  path: ./platform/base/kube-prometheus-stack
  postBuild:
    substituteFrom:
      # ${tailnet} -> Grafana root_url + OIDC URLs ({grafana,idp}.<tailnet>.ts.net).
      - kind: ConfigMap
        name: fleet-vars
