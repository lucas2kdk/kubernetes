apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kube-prometheus-stack
  namespace: flux-system
spec:
  path: ./platform/base/kube-prometheus-stack
  postBuild:
    substituteFrom:
      # ${tailnet} -> Grafana root_url + OIDC URLs ({grafana,idp}.<tailnet>.ts.net).
      - kind: ConfigMap
        name: fleet-vars
      # ${cluster_name} -> Prometheus `cluster` external label + the Alertmanager
      # route that mutes the test cluster (release.yaml).
      - kind: ConfigMap
        name: cluster-vars
