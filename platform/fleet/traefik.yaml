# Traefik ingress controller (ClusterIP-only for now).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: traefik
  namespace: flux-system
spec:
  path: ./base/traefik
  dependsOn:
    # Serves TLS from cert-manager-issued certs, so cert-manager comes first.
    - name: cert-manager
