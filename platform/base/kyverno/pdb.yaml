# PDB for the Kyverno admission controller, capping voluntary disruptions so a
# drain can't take down the webhook backend (which would block admission while it
# is unavailable — though forceFailurePolicyIgnore in release.yaml keeps that
# fail-open). The chart ships no PDB, so this is added here.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: kyverno-admission-controller
  namespace: kyverno
spec:
  # ponytail: maxUnavailable rather than minAvailable — at 1 replica, minAvailable: 1
  # yields 0 disruptions allowed and deadlocks kubectl drain (same class as the
  # forceFailurePolicyIgnore issue). maxUnavailable: 1 allows drain at any replica count
  # while still capping disruptions to 1 when scaled to 3+.
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: admission-controller
      app.kubernetes.io/instance: kyverno
