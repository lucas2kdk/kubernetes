# Kyverno admission-controller HelmRelease. Installs/owns the Kyverno CRDs and the
# four controllers (admission, background, cleanup, reports); the ClusterPolicies
# in platform/base/policies are applied separately by kyverno-policies. Tuning
# below is hard-won — see the dated incident notes inline before changing limits
# or failure-policy settings.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno
spec:
  interval: 1h
  releaseName: kyverno
  chart:
    spec:
      chart: kyverno
      version: "3.8.1" # Renovate-managed
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    # Emit a ServiceMonitor per controller (:8000 metrics) so the Kyverno
    # dashboard (gnetId 15987) has data. kyverno ns is excluded from the cluster
    # default-deny; Prometheus discovers these via
    # serviceMonitorSelectorNilUsesHelmValues:false.
    admissionController:
      serviceMonitor:
        enabled: true
    # The chart-default 128Mi memory limit is smaller than the ~120MB kyverno
    # binary, so the kernel satisfies the limit by evicting the controller's
    # own executable page cache and re-reading it from disk forever (no OOM
    # kill, memory.events:max in the millions). On 2026-06-12 the background +
    # reports controllers read ~3TB this way, pinning the HDD system disk at
    # 100% util and stalling etcd → apiserver brownouts → CSI/PVC failures.
    # Limits must stay comfortably above binary size + heap.
    backgroundController:
      serviceMonitor:
        enabled: true
      resources:
        requests:
          memory: 128Mi
        limits:
          memory: 512Mi
    cleanupController:
      serviceMonitor:
        enabled: true
      resources:
        requests:
          memory: 128Mi
        limits:
          memory: 512Mi
    reportsController:
      serviceMonitor:
        enabled: true
      resources:
        requests:
          memory: 128Mi
        limits:
          memory: 512Mi
    features:
      # Fail-closed webhooks assume the admission controller outlives any one
      # node — impossible on a single-node cluster, where every drain evicts
      # Kyverno and its webhook then rejects kubelet's final pod deletions,
      # deadlocking the drain (hit 2026-06-11 during a Talos upgrade; see
      # bootstrap repo docs/longhorn.md). Force Ignore so node lifecycle never
      # depends on Kyverno being up. When the cluster grows to 3+ nodes, drop
      # this and set admissionController.replicas: 3 instead to get fail-closed
      # enforcement back without the deadlock.
      forceFailurePolicyIgnore:
        enabled: true
    config:
      webhooks:
        namespaceSelector:
          matchExpressions:
            - key: kubernetes.io/metadata.name
              operator: NotIn
              values:
                - kube-system # chart default; this list replaces it, so keep it
                # Longhorn recommends keeping policy engines out of its
                # namespace so volume attach/rebuild is never gated on them.
                - longhorn-system
    # Helm test pods (helm.sh/hook: test) default the readiness-checker image to
    # the mutable :latest tag. Pin it (to the chart's kyverno app version) so the
    # tag isn't a moving target and the image CVE scan tracks a fixed ref. Full
    # registry/repository/tag so Renovate can bump it.
    test:
      image:
        registry: ghcr.io
        repository: kyverno/readiness-checker
        tag: v1.18.1
