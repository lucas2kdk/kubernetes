apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno
spec:
  interval: 1h
  releaseName: kyverno
  chart:
    spec:
      chart: kyverno
      version: "3.x"
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    # Emit a ServiceMonitor per controller (:8000 metrics) so the Kyverno
    # dashboard (gnetId 15987) has data. kyverno ns is excluded from the cluster
    # default-deny; Prometheus discovers these via
    # serviceMonitorSelectorNilUsesHelmValues:false.
    admissionController:
      serviceMonitor:
        enabled: true
    backgroundController:
      serviceMonitor:
        enabled: true
    cleanupController:
      serviceMonitor:
        enabled: true
    reportsController:
      serviceMonitor:
        enabled: true
    features:
      # Fail-closed webhooks assume the admission controller outlives any one
      # node — impossible on a single-node cluster, where every drain evicts
      # Kyverno and its webhook then rejects kubelet's final pod deletions,
      # deadlocking the drain (hit 2026-06-11 during a Talos upgrade; see
      # bootstrap repo docs/longhorn.md). Force Ignore so node lifecycle never
      # depends on Kyverno being up. When the cluster grows to 3+ nodes, drop
      # this and set admissionController.replicas: 3 instead to get fail-closed
      # enforcement back without the deadlock.
      forceFailurePolicyIgnore:
        enabled: true
    config:
      webhooks:
        namespaceSelector:
          matchExpressions:
            - key: kubernetes.io/metadata.name
              operator: NotIn
              values:
                - kube-system # chart default; this list replaces it, so keep it
                # Longhorn recommends keeping policy engines out of its
                # namespace so volume attach/rebuild is never gated on them.
                - longhorn-system
