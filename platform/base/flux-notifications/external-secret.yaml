# Discord webhook for Flux's notification-controller, reusing the same Vault
# secret as the Alertmanager receiver (secret/platform/alertmanager-discord,
# property webhook_url) so drift pings land in the same channel. ESO remaps it to
# the key Flux's Provider expects: `address`. Point this at a separate Vault
# path/property if you want drift alerts in their own Discord channel.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: flux-discord
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: flux-discord
    creationPolicy: Owner
  data:
    - secretKey: address
      remoteRef:
        key: platform/alertmanager-discord
        property: webhook_url
