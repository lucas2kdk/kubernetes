# Expose Grafana on the tailnet only — same model as Headlamp: no Traefik
# route, no cert-manager cert, no public DNS, zero public attack surface. The
# Tailscale operator provisions a proxy device named "grafana" (tag:k8s) serving
# HTTPS with a tailnet cert: https://grafana.<tailnet>.ts.net
# Requires MagicDNS + HTTPS certificates on the tailnet, and an ACL that lets
# your device reach tag:k8s:443.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: monitoring
  # Auto-register on the homepage dashboard. homepage can't derive a URL from
  # this Ingress (defaultBackend, no host rules), so href is set explicitly.
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Grafana
    gethomepage.dev/description: Metrics & dashboards
    gethomepage.dev/group: Platform
    gethomepage.dev/icon: grafana.png
    gethomepage.dev/href: "https://grafana.${tailnet}.ts.net"
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: kube-prometheus-stack-grafana
      port:
        number: 80
  tls:
    - hosts:
        - grafana
