# kube-prometheus-stack base: the monitoring root of the fleet. Installs the
# Prometheus-Operator + its ServiceMonitor/PodMonitor/Rule CRDs (so every
# monitor-shipping component dependsOn this), plus Prometheus + Grafana and the
# committed Grafana dashboards. The flux/longhorn monitors themselves are NOT
# bundled here — they live in monitoring-extras so they reconcile after the CRDs
# exist (see platform/base/monitoring-extras/kustomization.yaml).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - source.yaml
  - release.yaml
  - external-secret.yaml
  - external-secret-alertmanager.yaml
  - prometheusrules.yaml
  - ingress.yaml
  - dashboards/15661-k8s.yaml
  - dashboards/16714-flux2.yaml
  - dashboards/11001-cert-manager.yaml
  - dashboards/15987-kyverno.yaml
  - dashboards/16888-longhorn.yaml
  - dashboards/platform-version.yaml
  # Replacements for the chart defaults we disabled + per-component coverage.
  - dashboards/1860-node-exporter.yaml
  - dashboards/3662-prometheus.yaml
  - dashboards/9578-alertmanager.yaml
  - dashboards/15762-coredns.yaml
  - dashboards/13332-kube-state-metrics.yaml
  - dashboards/16611-cilium-agent.yaml
  - dashboards/16613-hubble.yaml
  - dashboards/17346-traefik.yaml
  - dashboards/21217-external-secrets.yaml
  - dashboards/17813-trivy-operator.yaml
  # Datastore backends for the gitlab tenant (redis_exporter / MinIO / CNPG).
  - dashboards/763-redis.yaml
  - dashboards/13502-minio.yaml
  - dashboards/20417-cnpg.yaml

# The committed Grafana dashboard JSON carries literal ${...} tokens (Grafana
# template variables) that Flux's post-build envsubst can't parse — it fails the
# whole Kustomization. Exempt the dashboard ConfigMaps from substitution so only
# the HelmRelease's ${tailnet} resolves. (substituteFrom is set on the fleet
# Kustomization, platform/fleet/kube-prometheus-stack.yaml.)
patches:
  - target:
      kind: ConfigMap
      labelSelector: grafana_dashboard=1
    patch: |
      - op: add
        path: /metadata/annotations/kustomize.toolkit.fluxcd.io~1substitute
        value: disabled
