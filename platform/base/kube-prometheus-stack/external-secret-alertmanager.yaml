# Discord webhook URL for Alertmanager, stored at secret/platform/alertmanager-discord
# (property: webhook_url). Mounted into the Alertmanager pod via
# alertmanager.alertmanagerSpec.secrets in release.yaml and read by the
# discord_configs receivers as webhook_url_file — the URL never lands in the
# rendered Alertmanager config or in git.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-discord
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: alertmanager-discord
    creationPolicy: Owner
  data:
    - secretKey: webhook_url
      remoteRef:
        key: platform/alertmanager-discord
        property: webhook_url
