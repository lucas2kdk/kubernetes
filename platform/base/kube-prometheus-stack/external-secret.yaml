# OIDC client credentials for Grafana, registered in tsidp (admin UI at
# https://idp.<tailnet>.ts.net) and stored at secret/platform/grafana-oidc.
# Wired into the HelmRelease's generic_oauth via the GF_AUTH_GENERIC_OAUTH_*
# env vars (envValueFrom in release.yaml).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-oidc
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: grafana-oidc
    creationPolicy: Owner
  data:
    - secretKey: client_id
      remoteRef:
        key: platform/grafana-oidc
        property: client_id
    - secretKey: client_secret
      remoteRef:
        key: platform/grafana-oidc
        property: client_secret
