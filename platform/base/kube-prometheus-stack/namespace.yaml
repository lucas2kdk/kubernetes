# PSA privileged: node-exporter needs hostNetwork/hostPID/hostPath/hostPort,
# which Talos's cluster-wide "baseline" enforcement rejects. Kyverno policies
# still apply to this namespace.
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    platform.io/managed: "true"
    pod-security.kubernetes.io/enforce: privileged
