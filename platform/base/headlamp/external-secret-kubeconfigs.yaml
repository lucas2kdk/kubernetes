# Auto-discovers every cluster's admin kubeconfig from Vault. Each cluster's
# bootstrap/terraform/clusters/<name>/vault.tf publishes its kubeconfig to
# secret/platform/kubeconfigs/<name>; ESO `find` walks that path and lands one
# file per cluster under /kubeconfigs/<name> in the resulting Secret. Adding a
# new cluster is then just `terraform apply` + appending one path slot to the
# KUBECONFIG env in release.yaml — no edits here.
#
# The local prod-fsn kubeconfig is discovered too (find can't skip it without
# negative lookahead, which Go regexp lacks) but is intentionally NOT listed in
# KUBECONFIG: prod-fsn access stays on the in-cluster ServiceAccount so the
# OIDC group RBAC in rbac-oidc.yaml keeps applying instead of being bypassed by
# the embedded admin client cert.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: headlamp-kubeconfigs
  namespace: headlamp
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: headlamp-kubeconfigs
    creationPolicy: Owner
  dataFrom:
    - find:
        path: platform/kubeconfigs
        name:
          regexp: ".*"
      # ESO uses the full Vault path as the key, which contains '/' (invalid in
      # Secret keys); strip the prefix so files land at /kubeconfigs/<cluster>.
      rewrite:
        - regexp:
            source: "^platform/kubeconfigs/(.+)$"
            target: "$1"
