apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
spec:
  interval: 1h
  releaseName: headlamp
  chart:
    spec:
      chart: headlamp
      version: "0.42.0" # Renovate-managed
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    config:
      oidc:
        # Client credentials come from the headlamp-oidc Secret via valuesFrom
        # below. Issuer is tsidp; the kube-apiserver trusts it through the
        # oidc-* flags set in the Talos machine config (bootstrap repo).
        issuerURL: https://idp.penguin-bigeye.ts.net
        scopes: "openid,email,profile"
      # The plugin manager runs as a SIDECAR (not an init container) and takes
      # ~12s to download plugins, while the backend scans pluginsDir once at
      # startup — so without this the freshly-installed plugins never appear in
      # the /plugins list and the frontend won't load them. watchPlugins makes
      # the backend re-read the dir as the sidecar (which itself runs --watch)
      # writes them, fixing the race on every pod start.
      watchPlugins: true
    # Plugins are fetched from Artifact Hub at pod start by the chart's plugin
    # manager sidecar (node:lts-alpine) and dropped into config.pluginsDir.
    # Versions are pinned; bump them deliberately when upstream releases.
    pluginsManager:
      enabled: true
      configContent: |
        plugins:
          - name: flux
            source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_flux
            version: 0.6.0
          - name: cert-manager
            source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_cert-manager
            version: 0.1.1
        installOptions:
          parallel: true
          maxConcurrent: 2
    # trivy-operator UI plugin (kubebeam) — not on Artifact Hub, ships as an OCI
    # image whose layer is just the built plugin bundle. The init container copies
    # it into the chart-managed plugins-dir emptyDir before the headlamp backend
    # starts; watchPlugins above then picks it up alongside the sidecar's writes.
    initContainers:
      - name: trivy-headlamp-plugin
        image: ghcr.io/kubebeam/trivy-headlamp-plugin:v0.3.2 # Renovate-managed
        command: ["/bin/sh", "-c", "cp -r /plugins/* /headlamp/plugins/"]
        volumeMounts:
          - name: plugins-dir
            mountPath: /headlamp/plugins
    # Multi-cluster: every cluster publishes its admin kubeconfig to Vault from
    # bootstrap/terraform/clusters/*/vault.tf; the headlamp-kubeconfigs ESO
    # materializes one file per cluster under /kubeconfigs/. KUBECONFIG joins
    # them so the headlamp backend exposes both contexts in the picker. The
    # in-cluster ServiceAccount path stays active alongside (OIDC RBAC on
    # prod-fsn) since headlamp loads it independently of KUBECONFIG.
    # KUBECONFIG adds remote clusters to headlamp's picker; the local cluster is
    # still loaded via the in-cluster ServiceAccount (chart sets -in-cluster by
    # default), so prod-fsn access keeps going through the OIDC RBAC instead of
    # the admin kubeconfig.
    env:
      - name: KUBECONFIG
        value: /kubeconfigs/test-home
    volumes:
      - name: kubeconfigs
        secret:
          secretName: headlamp-kubeconfigs
          defaultMode: 0400
    volumeMounts:
      - name: kubeconfigs
        mountPath: /kubeconfigs
        readOnly: true
  valuesFrom:
    - kind: Secret
      name: headlamp-oidc
      valuesKey: client_id
      targetPath: config.oidc.clientID
    - kind: Secret
      name: headlamp-oidc
      valuesKey: client_secret
      targetPath: config.oidc.clientSecret
