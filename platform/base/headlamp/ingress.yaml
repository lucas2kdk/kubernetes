# Expose Headlamp on the tailnet only — per the platform spec there is no
# Traefik route, cert-manager cert, or public DNS for it; zero public attack
# surface. The Tailscale operator provisions a proxy device named "headlamp"
# (tag:k8s, proxyConfig.defaultTags) serving HTTPS with a tailnet cert:
# https://headlamp.<tailnet>.ts.net
# Requires MagicDNS + HTTPS certificates enabled on the tailnet, and an ACL
# that lets your device reach tag:k8s:443.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: headlamp
  namespace: headlamp
  # Auto-register on the homepage dashboard (explicit href — defaultBackend
  # ingress has no host rules for homepage to infer the URL from).
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Headlamp
    gethomepage.dev/description: Kubernetes UI
    gethomepage.dev/group: Platform
    gethomepage.dev/icon: headlamp.png
    gethomepage.dev/href: "https://headlamp.${tailnet}.ts.net"
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: headlamp
      port:
        number: 80
  tls:
    - hosts:
        - headlamp
