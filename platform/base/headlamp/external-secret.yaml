# OIDC client credentials for Headlamp, registered in tsidp (admin UI at
# https://idp.<tailnet>.ts.net) and stored at secret/platform/headlamp-oidc.
# Wired into the HelmRelease via valuesFrom.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: headlamp-oidc
  namespace: headlamp
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: headlamp-oidc
    creationPolicy: Owner
  data:
    - secretKey: client_id
      remoteRef:
        key: platform/headlamp-oidc
        property: client_id
    - secretKey: client_secret
      remoteRef:
        key: platform/headlamp-oidc
        property: client_secret
