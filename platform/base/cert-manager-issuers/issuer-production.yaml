# Let's Encrypt production issuer. DNS-01 only (Cloudflare is authoritative for
# rosenvold.tech), so it can issue wildcards and works with no public ingress.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: lucas@rosenvold.tech
    privateKeySecretRef:
      name: letsencrypt-production-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
