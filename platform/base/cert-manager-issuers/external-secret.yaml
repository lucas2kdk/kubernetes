# Syncs the Cloudflare API token (Zone/DNS/Edit + Zone/Zone/Read, scoped to
# rosenvold.tech) from Vault into the Secret the ClusterIssuers' DNS-01 solver
# references. It lands in the cert-manager namespace because ClusterIssuer
# secret refs resolve in cert-manager's cluster-resource-namespace, which
# defaults to the namespace cert-manager runs in.
# Source: secret/platform/cloudflare in Vault, via the cluster-wide `vault` SecretStore.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: cloudflare-api-token
    creationPolicy: Owner
  data:
    - secretKey: api-token
      remoteRef:
        key: platform/cloudflare
        property: api-token
