# Let's Encrypt staging endpoint, exposed as the `letsencrypt-test` ClusterIssuer
# — trial new Certificate shapes here first; the production endpoint rate-limits
# (50 certs per registered domain per week). Test certs chain to an untrusted
# root, which is fine for plumbing checks.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-test
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: lucas@rosenvold.tech
    privateKeySecretRef:
      name: letsencrypt-test-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
