# Cluster-wide SecretStore that points every ExternalSecret in the fleet at the
# shared HashiCorp Vault. Consumed by the cert-manager (cloudflare-api-token),
# tailscale (operator-oauth), tsidp (tsidp-auth) and headlamp (oidc + kubeconfigs)
# ExternalSecrets. Reads KV-v2 paths under secret/platform/*.
#
# Auth (this base): Vault's per-cluster kubernetes backend. ESO's controller
# ServiceAccount presents a token; Vault calls back to the cluster's TokenReview
# API to validate it (rbac-token-review.yaml in the ESO component grants ESO the
# system:auth-delegator role so that callback succeeds). The Vault role grants the
# eso-platform policy: read on secret/platform/*.
#
# mountPath carries the ${cluster_name} token, substituted in-cluster by Flux from
# each cluster's cluster-vars ConfigMap (so the base stays cluster-agnostic).
#
# OVERLAY: test-home's home-LAN apiserver isn't reachable for Vault's TokenReview
# callback, so platform/overlays/test-home/external-secrets-stores swaps this
# kubernetes auth block for an appRole block (and that cluster reconciles the
# overlay via its own clusters/test-home/external-secrets-stores.yaml Kustomization,
# since a Flux Kustomization's spec.path can't be substituted).
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault
spec:
  provider:
    vault:
      server: https://vault.rosenvold.tech
      path: secret
      version: v2
      auth:
        kubernetes:
          # Per-cluster Vault kubernetes-auth mount, substituted by Flux from cluster-vars.
          mountPath: kubernetes/${cluster_name}
          role: eso-platform
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
