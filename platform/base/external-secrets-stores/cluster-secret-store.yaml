# Cluster-wide SecretStore pointing every ExternalSecret at the shared HashiCorp Vault.
#
# Auth: Vault's per-cluster kubernetes backend (mounted at kubernetes/<cluster-name>,
# managed by Terraform). ESO mints a token for the external-secrets controller
# ServiceAccount and logs in to Vault, which validates the token offline against the
# cluster's public signing key (no TokenReview callback). The Vault role grants the
# eso-platform policy: read on secret/platform/*.
#
# mountPath is cluster-specific and is patched per cluster in
# platform/overlays/<cluster>/external-secrets/. The value below is a placeholder that
# every overlay overrides.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault
spec:
  provider:
    vault:
      server: https://vault.rosenvold.tech
      path: secret
      version: v2
      auth:
        kubernetes:
          # Per-cluster Vault kubernetes-auth mount, substituted by Flux from cluster-vars.
          mountPath: kubernetes/${cluster_name}
          role: eso-platform
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
