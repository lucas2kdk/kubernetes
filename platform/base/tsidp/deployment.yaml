# tsidp — Tailscale OIDC identity provider (https://github.com/tailscale/tsidp).
# Joins the tailnet as idp.<tailnet>.ts.net (tag:tsidp) and lets tailnet
# identity drive OIDC logins (Headlamp first).
#
# Funnel is on for one reason: the kube-apiserver validates OIDC tokens by
# fetching the issuer's discovery doc + JWKS, and the node has no tailnet
# access (operator-mode only, no host tailscaled) — Funnel makes those public
# endpoints reachable. Actual logins still require tailnet identity (tsidp
# resolves the caller via whois, which Funnel traffic does not have).
#
# State on a hostPath (single-node cluster, no CSI): tsnet node identity plus
# dynamically registered OIDC clients. Lost only on cluster rebuild —
# re-register clients then (see the bootstrap repo's tsidp runbook).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tsidp
  namespace: tsidp
spec:
  replicas: 1
  strategy:
    type: Recreate # single tailnet identity — never two instances at once
  selector:
    matchLabels:
      app: tsidp
  template:
    metadata:
      labels:
        app: tsidp
    spec:
      # The kubelet creates the hostPath root-owned; the image runs as
      # app (uid/gid 1001), so hand it the state dir before start.
      initContainers:
        - name: chown-state
          image: busybox@sha256:9532d8c39891ca2ecde4d30d7710e01fb739c87a8b9299685c63704296b16028
          command: ["/bin/sh", "-c", "chown -R 1001:1001 /data"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: state
              mountPath: /data
      containers:
        - name: tsidp
          image: ghcr.io/tailscale/tsidp@sha256:b3e7baf8dc0d309b8b34bedc286e38fd275daa302663e1b10f2ae774dff26b4a
          envFrom:
            - secretRef:
                name: tsidp-auth # TS_AUTHKEY
          env:
            - name: TAILSCALE_USE_WIP_CODE # required while tsidp < 1.0
              value: "1"
            - name: TS_HOSTNAME
              value: idp
            - name: TS_STATE_DIR
              value: /data
            - name: TS_ADVERTISE_TAGS
              value: tag:tsidp
            - name: TSIDP_USE_FUNNEL
              value: "1"
          volumeMounts:
            - name: state
              mountPath: /data
          # No liveness/readiness probe on purpose: tsidp serves OIDC over the
          # tailnet via tsnet + Funnel, so it binds no port on the pod IP (and
          # sits behind no Service) — a kubelet httpGet/tcpSocket probe would
          # fail against the pod IP and crash-loop a healthy auth provider. The
          # single process exiting already triggers a restart.
          resources:
            requests:
              cpu: 50m
              # Observed working set ~20Mi; 128Mi gives comfortable headroom.
              memory: 128Mi
            limits:
              # Memory limit only — no CPU limit (CPU limits cause throttling,
              # per the repo convention). Caps a runaway well above the working
              # set without risking an OOM-kill of the auth provider.
              memory: 256Mi
      volumes:
        - name: state
          hostPath:
            path: /var/mnt/tsidp
            type: DirectoryOrCreate
