# Builds TS_AUTHKEY for tsidp from a dedicated Tailscale OAuth client secret
# (scope: Auth Keys write, tag: tag:tsidp) stored at secret/platform/tsidp.
# An OAuth client secret used as an auth key never expires; the query params
# make the minted node key reusable across pod restarts and pre-approved.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tsidp-auth
  namespace: tsidp
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: tsidp-auth
    creationPolicy: Owner
    template:
      data:
        TS_AUTHKEY: "{{ .client_secret }}?ephemeral=false&preauthorized=true"
  data:
    - secretKey: client_secret
      remoteRef:
        key: platform/tsidp
        property: client_secret
