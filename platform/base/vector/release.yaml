apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vector
  namespace: vector
spec:
  interval: 1h
  releaseName: vector
  chart:
    spec:
      chart: vector
      version: "0.x" # TODO: pin exact version (Renovate-managed)
      sourceRef:
        kind: HelmRepository
        name: vector
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    role: Agent
    # TODO: sink shipping logs/metrics directly to Humio (no intermediate store).
