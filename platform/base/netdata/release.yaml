apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: netdata
  namespace: netdata
spec:
  interval: 1h
  releaseName: netdata
  chart:
    spec:
      chart: netdata
      version: "3.x" # TODO: pin exact version (Renovate-managed)
      sourceRef:
        kind: HelmRepository
        name: netdata
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values: {}
    # TODO: node-level metrics config; stream to parent / external store as needed.
