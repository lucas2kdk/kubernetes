apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-version-exporter
  namespace: flux-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform-version-exporter
  template:
    metadata:
      labels:
        app: platform-version-exporter
    spec:
      serviceAccountName: default
      containers:
        - name: exporter
          # Full registry/repository/tag@sha256 per SEC3 (Renovate-managed): the
          # tag lets Renovate bump it, the digest keeps the deploy immutable and
          # the CVE scan tracking a fixed ref. Enforced by check-image-digests.sh.
          image: docker.io/library/python:3.14-alpine@sha256:db66119d6609a3a941a9433b225f4e13d33c459cede097cf3ec2fc4d1bd314b2 # Renovate-managed
          command:
            - python3
            - -c
            - |
              import http.server, pathlib
              version = pathlib.Path('/config/version').read_text().strip()
              body = (
                '# HELP platform_build_info Platform bundle version\n'
                '# TYPE platform_build_info gauge\n'
                f'platform_build_info{{version="{version}"}} 1\n'
              ).encode()
              class H(http.server.BaseHTTPRequestHandler):
                def do_GET(self):
                  self.send_response(200)
                  self.send_header('Content-Type', 'text/plain; version=0.0.4')
                  self.end_headers()
                  self.wfile.write(body)
                def log_message(self, *_): pass
              http.server.HTTPServer(('', 8080), H).serve_forever()
          ports:
            - name: metrics
              containerPort: 8080
          volumeMounts:
            - name: version
              mountPath: /config
          resources:
            requests:
              cpu: 1m
              memory: 16Mi
            limits:
              memory: 32Mi
      volumes:
        - name: version
          configMap:
            name: platform-version
---
apiVersion: v1
kind: Service
metadata:
  name: platform-version-exporter
  namespace: flux-system
  labels:
    app: platform-version-exporter
spec:
  selector:
    app: platform-version-exporter
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: platform-version-exporter
  namespace: flux-system
spec:
  selector:
    matchLabels:
      app: platform-version-exporter
  endpoints:
    - port: metrics
      interval: 60s
      path: /metrics
