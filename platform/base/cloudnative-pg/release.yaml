# CloudNativePG operator: provides the postgresql.cnpg.io CRDs (Cluster, etc.)
# so tenants can declare their own Postgres. The GitLab tenant uses it (chart 10
# / GitLab 19 dropped the bundled PostgreSQL). The operator itself owns no
# databases — instances are tenant-declared Cluster CRs.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
  namespace: cnpg-system
spec:
  interval: 1h
  releaseName: cloudnative-pg
  chart:
    spec:
      chart: cloudnative-pg
      version: "0.28.3" # Renovate-managed (operator v1.29.1)
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    crds:
      create: true
