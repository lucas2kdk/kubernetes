apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: policy-reporter
  namespace: policy-reporter
spec:
  interval: 1h
  releaseName: policy-reporter
  chart:
    spec:
      chart: policy-reporter
      version: "3.7.4" # Renovate-managed
      sourceRef:
        kind: HelmRepository
        name: policy-reporter
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # Web UI for browsing policy results
    ui:
      enabled: true
    # Pull results from the Kyverno PolicyReport CRDs
    plugin:
      kyverno:
        enabled: true
