# Policy Reporter component base: aggregates Kyverno PolicyReport CRDs and serves
# the browsing UI. Reconciled by platform/fleet/policy-reporter.yaml
# (dependsOn: kyverno, since it reads the PolicyReports Kyverno produces).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - source.yaml
  - release.yaml
