# HelmRepository for the Policy Reporter chart, in the shared flux-system source
# namespace (cross-namespace sourceRef is allowed for platform components).
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: policy-reporter
  namespace: flux-system
spec:
  interval: 1h
  url: https://kyverno.github.io/policy-reporter
