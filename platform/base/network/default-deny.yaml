# ============================================================================
# NAMESPACE EXCLUSION LIST — ONE OF FOUR THAT MUST STAY SET-IDENTICAL.
# The NotIn `values:` list below is one of the four platform-namespace exclusion
# lists kept in lockstep (the other three: deny-cloud-metadata.yaml,
# allow-ingress-from-traefik.yaml, and policies/generate-baseline-netpol.yaml).
# scripts/check-namespace-lists.sh (`just namespaces`, part of the PR gate) FAILS
# the build if they diverge. Adding a platform namespace = edit all four by hand;
# Cilium can't match arbitrary namespace labels in a NotIn, so this stays a
# literal string list rather than a platform.io/managed selector.
#
# longhorn-system (Terraform-managed storage) is the special case: it MUST stay
# excluded in all four. On 2026-06-12 the lists drifted and a baseline CNP got
# generated into longhorn-system, flipping it into default-deny and cutting the
# CSI sidecars off from the kube-apiserver — provisioner crash-loop, PVCs stuck
# Pending, cluster-wide storage outage. The drift guard now prevents that class.
# ============================================================================
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: default-deny
spec:
  description: >-
    Cluster-wide default-deny for workload namespaces. Platform namespaces
    (kube-system, flux-system, kyverno, policy-reporter, ...) are excluded so the
    control plane, GitOps reconciliation, and admission webhooks keep working.
    Selected workloads may only reach DNS and the host/control-plane; all other
    ingress and egress must be granted by an explicit allow policy.
  endpointSelector:
    matchExpressions:
      # Default-deny everything EXCEPT the platform-managed namespaces. Locking
      # these down would break CoreDNS, Flux (egress to GitHub), and the Kyverno
      # webhook — and risk locking GitOps out of its own recovery path.
      - key: k8s:io.kubernetes.pod.namespace
        operator: NotIn
        values:
          - kube-system
          - kube-node-lease
          - kube-public
          - flux-system
          - kyverno
          - policy-reporter
          # Platform component namespaces — managed by the platform, not tenant
          # workloads. Excluded so cert-manager (ACME/DNS), ESO (Vault), Tailscale
          # (tailnet), Traefik (LB ingress), and Prometheus (scrape) keep working.
          # Tighten with explicit allow policies in V2.
          - cert-manager
          - external-secrets
          - tailscale
          - traefik
          - monitoring
          - headlamp
          - tsidp
          - trivy-system
          # Terraform-managed storage layer; excluded so Prometheus can scrape
          # longhorn-manager (:9500) for the Longhorn dashboard and so volume
          # attach/rebuild is never gated on a network policy.
          - longhorn-system
          # Cilium Gateway API trial (platform/base/cilium-gateway): the Gateway's
          # Envoy proxy pod runs here and must not be caught by default-deny.
          - cilium-gateway
          # DB operators (platform/base/{cloudnative-pg,redis-operator}): each
          # operator reaches the Postgres/Redis instance pods it manages in tenant
          # namespaces (e.g. gitlab), which default-deny egress would otherwise drop.
          - cnpg-system
          - redis-operator
  ingress:
    # Allow node-level traffic (kubelet health/liveness probes) and the API server.
    - fromEntities:
        - host
        - remote-node
        - kube-apiserver
  egress:
    - toEntities:
        - host
        - remote-node
        - kube-apiserver
    # Allow DNS resolution against CoreDNS so name lookups still work.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
