apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: deny-cloud-metadata
spec:
  description: >-
    Cluster-wide deny of egress to the link-local cloud/instance metadata
    endpoint (169.254.169.254). Anti-SSRF defense in depth: a compromised
    workload cannot reach node/cloud metadata to harvest credentials. Deny
    rules take precedence over allow rules in Cilium, so this also covers the
    platform namespaces that are exempt from the default-deny policy.
  endpointSelector: {}
  egressDeny:
    - toCIDR:
        - 169.254.169.254/32
