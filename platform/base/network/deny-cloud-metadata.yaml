# ============================================================================
# NAMESPACE EXCLUSION LIST — ONE OF FOUR THAT MUST STAY SET-IDENTICAL.
# The NotIn `values:` list below is one of the four platform-namespace exclusion
# lists kept in lockstep (the other three: default-deny.yaml,
# allow-ingress-from-traefik.yaml, and policies/generate-baseline-netpol.yaml),
# enforced by scripts/check-namespace-lists.sh (`just namespaces`, PR gate).
# Add a platform namespace to all four by hand.
#
# longhorn-system MUST stay excluded here too: see the inline comment on its
# entry below and the 2026-06-12 CSI outage (the drift the guard now prevents).
# ============================================================================
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: deny-cloud-metadata
spec:
  description: >-
    Deny egress to the link-local cloud/instance metadata endpoint
    (169.254.169.254) from workload namespaces. Anti-SSRF defense in depth: a
    compromised workload cannot reach node/cloud metadata to harvest
    credentials. Scoped with the same namespace exclusions as default-deny —
    NOT endpointSelector: {} — because in Cilium ANY rule that selects an
    endpoint flips it into default-deny for that direction. An empty selector
    put every pod (including kube-system, flux-system, kyverno) into
    egress-deny with no allow rules, breaking DNS, webhooks, and Flux's own
    GitHub access cluster-wide. Extending the metadata deny to platform
    namespaces is V2 work, done with explicit allow policies in place.
  endpointSelector:
    matchExpressions:
      - key: k8s:io.kubernetes.pod.namespace
        operator: NotIn
        values:
          - kube-system
          - kube-node-lease
          - kube-public
          - flux-system
          - kyverno
          - policy-reporter
          - cert-manager
          - external-secrets
          - tailscale
          - traefik
          - monitoring
          - headlamp
          - tsidp
          - trivy-system
          # longhorn-system must stay in lockstep with default-deny and
          # allow-ingress-from-traefik: selecting it here with an egressDeny
          # rule enables Cilium egress policy enforcement on its pods, which
          # blocks egress to the kube-apiserver entity (not covered by any
          # allow rule when longhorn-system is outside all other CCNPs).
          - longhorn-system
          - cilium-gateway # Cilium Gateway API trial; lockstep with default-deny.
  egressDeny:
    - toCIDR:
        - 169.254.169.254/32
