# ============================================================================
# NAMESPACE EXCLUSION LIST — ONE OF FOUR THAT MUST STAY SET-IDENTICAL.
# The NotIn `values:` list below is one of the four platform-namespace exclusion
# lists kept in lockstep (the other three: default-deny.yaml,
# deny-cloud-metadata.yaml, and policies/generate-baseline-netpol.yaml), enforced
# by scripts/check-namespace-lists.sh (`just namespaces`, PR gate). Add a platform
# namespace to all four by hand.
#
# NOTE: allow-ingress-from-monitoring.yaml mirrors this same list but is NOT one
# of the four guarded files — keep it aligned manually.
# longhorn-system MUST stay excluded (see its inline comment + the 2026-06-12
# CSI outage that the lockstep guard now prevents).
# ============================================================================
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-ingress-from-traefik
spec:
  description: >-
    Allow ingress to workload namespaces from the Traefik ingress controller.
    Without this, the default-deny policy blocks all traffic to pods behind the
    ingress. Additive allow — pairs with the per-namespace baseline CNP that
    permits same-namespace traffic.
  # Mirror the default-deny selector: applies to workload namespaces only, not
  # the platform-managed namespaces (which are exempt from default-deny anyway).
  endpointSelector:
    matchExpressions:
      - key: k8s:io.kubernetes.pod.namespace
        operator: NotIn
        values:
          - kube-system
          - kube-node-lease
          - kube-public
          - flux-system
          - kyverno
          - policy-reporter
          - cert-manager
          - external-secrets
          - tailscale
          - traefik
          - monitoring
          - headlamp
          - tsidp
          - trivy-system
          # longhorn-system is excluded from default-deny and manages its own
          # connectivity; adding it here prevents allow-ingress-from-traefik from
          # being the only policy applied and implicitly blocking intra-namespace
          # traffic (e.g. longhorn-manager → instance-manager gRPC on :8500).
          - longhorn-system
          - cilium-gateway # Cilium Gateway API trial; lockstep with default-deny.
          # DB / storage operators; lockstep with default-deny.
          - cnpg-system
          - redis-operator
          - minio-operator
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: traefik
