# Tailscale chart repo for the operator HelmRelease. Centralized in flux-system
# with the other platform sources (tenants can't ref it cross-namespace).
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: tailscale
  namespace: flux-system
spec:
  interval: 1h
  url: https://pkgs.tailscale.com/helmcharts
