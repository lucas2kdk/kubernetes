# Syncs the Tailscale operator's OAuth client credentials from Vault into the
# `operator-oauth` Secret the chart expects (keys: client_id, client_secret). The chart's
# oauth.clientId/clientSecret are left empty so it references this pre-existing secret.
# Source: secret/platform/tailscale in Vault, via the cluster-wide `vault` SecretStore.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tailscale-operator-oauth
  namespace: tailscale
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: operator-oauth
    creationPolicy: Owner
  data:
    - secretKey: client_id
      remoteRef:
        key: platform/tailscale
        property: client_id
    - secretKey: client_secret
      remoteRef:
        key: platform/tailscale
        property: client_secret
