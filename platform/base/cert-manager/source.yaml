# Jetstack chart repo for the cert-manager HelmRelease. Centralized in
# flux-system with the other platform sources (tenants can't ref it cross-namespace).
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  interval: 1h
  url: https://charts.jetstack.io
