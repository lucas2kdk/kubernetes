apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 1h
  releaseName: cert-manager
  chart:
    spec:
      chart: cert-manager
      version: "v1.20.2" # Renovate-managed
      sourceRef:
        kind: HelmRepository
        name: cert-manager
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    crds:
      enabled: true
    # Emit a ServiceMonitor for the controller's :9402 metrics so the
    # cert-manager dashboard (gnetId 11001) has data. cert-manager is excluded
    # from the cluster default-deny, so the scrape is allowed. Prometheus
    # discovers it via serviceMonitorSelectorNilUsesHelmValues:false.
    prometheus:
      enabled: true
      servicemonitor:
        enabled: true
    # Let's Encrypt ClusterIssuers (Cloudflare DNS-01) live in the separate
    # cert-manager-issuers component: they need both cert-manager CRDs and the
    # ESO-synced Cloudflare token, so they reconcile behind
    # dependsOn [cert-manager, external-secrets-stores] instead of coupling this release
    # to ESO. If DNS-01 self-checks ever stall behind cluster DNS, set
    # dns01RecursiveNameservers: "1.1.1.1:53,8.8.8.8:53" (+ ...Only: true) here.
