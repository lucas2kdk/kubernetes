apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 1h
  releaseName: cert-manager
  chart:
    spec:
      chart: cert-manager
      version: "v1.x" # TODO: pin exact version (Renovate-managed)
      sourceRef:
        kind: HelmRepository
        name: cert-manager
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    crds:
      enabled: true
    # TODO: ClusterIssuers for Let's Encrypt DNS-01 (DigitalOcean DNS solver for
    # DO-authoritative zones, Cloudflare solver for Cloudflare zones). Solver API
    # tokens come from Vault via External Secrets — add once ESO SecretStore is live.
