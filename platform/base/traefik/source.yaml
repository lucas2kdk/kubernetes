# Traefik chart repo for the HelmRelease. Centralized in flux-system with the
# other platform sources (tenants can't ref it cross-namespace).
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: traefik
  namespace: flux-system
spec:
  interval: 1h
  url: https://traefik.github.io/charts
