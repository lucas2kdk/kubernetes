apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: pod-security-baseline
  annotations:
    policies.kyverno.io/title: Pod Security Standards (Baseline)
    policies.kyverno.io/category: Pod Security Standards
    policies.kyverno.io/description: >-
      Enforce the Kubernetes Pod Security Standards "baseline" profile:
      no privileged containers, host namespaces, hostPath/hostPort, or
      dangerous capabilities. Uses Kyverno's built-in podSecurity subrule so
      all container types (init, ephemeral) are covered correctly.
spec:
  # Enforce (see failureAction below) — promoted from Audit in #107 once all
  # tenant workloads were compliant. background: true also evaluates pre-existing
  # pods so standing violations still surface in reports.
  background: true
  rules:
    - name: baseline
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          # Platform/system namespaces run privileged components and are not
          # tenant workloads — same exclusion set as flux-multi-tenancy.
          - resources:
              namespaces:
                - kube-system
                - kube-node-lease
                - kube-public
                - flux-system
          # Platform-managed namespaces carry the platform.io/managed label;
          # the system namespaces above are not repo-managed.
          - resources:
              namespaceSelector:
                matchLabels:
                  platform.io/managed: "true"
      validate:
        # Enforce: tenant workloads must meet the baseline PSS at admission (no
        # privileged containers, host namespaces, hostPath/hostPort). Promoted
        # from Audit once policy reports were clean across all tenant namespaces
        # (the DB/storage operators run in platform.io/managed namespaces, which
        # are excluded above). Uses Kyverno's native podSecurity subrule so
        # init/ephemeral containers are evaluated; version: latest tracks the
        # newest PSS ruleset Kyverno ships.
        failureAction: Enforce
        podSecurity:
          level: baseline
          version: latest
