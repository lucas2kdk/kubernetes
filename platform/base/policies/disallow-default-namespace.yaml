apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-default-namespace
  annotations:
    policies.kyverno.io/title: Disallow Default Namespace
    policies.kyverno.io/category: Multi-Tenancy
    policies.kyverno.io/description: >-
      Workloads must run in a dedicated, named namespace rather than the
      'default' namespace. Keeps the tenant model clean and complements
      flux-multi-tenancy.
spec:
  # background: true also evaluates pods that already exist, surfacing pre-existing
  # violations in PolicyReports (not just at admission).
  background: true
  rules:
    - name: disallow-default-namespace
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        # Audit, not Enforce: reports the violation but does not block admission.
        # No namespace exclusions needed — the rule only ever targets `default`,
        # which is neither a platform nor a tenant namespace.
        failureAction: Audit
        message: "Workloads must run in a dedicated namespace, not 'default'."
        deny:
          conditions:
            any:
              - key: "{{ request.namespace }}"
                operator: Equals
                value: default
