# ============================================================================
# NAMESPACE EXCLUSION LIST — ONE OF FOUR THAT MUST STAY SET-IDENTICAL.
# The exclude `names:` list below is the Kyverno member of the four-place
# platform-namespace lockstep:
#   1. platform/base/network/default-deny.yaml            (Cilium NotIn values)
#   2. platform/base/network/deny-cloud-metadata.yaml     (Cilium NotIn values)
#   3. platform/base/network/allow-ingress-from-traefik.yaml (Cilium NotIn values)
#   4. THIS FILE                                          (Kyverno exclude names)
# scripts/check-namespace-lists.sh (`just namespaces`, part of `just check` and
# the PR gate) FAILS the build if these four diverge. Adding a platform namespace
# means editing all four by hand — labelling the namespace is NOT enough here,
# because this rule matches on Namespace kind, not via the platform.io/managed
# namespaceSelector the pod policies use.
#
# longhorn-system special case: it is Terraform-managed storage with NO baseline
# CNP on purpose. On 2026-06-12 the lists fell out of lockstep and a baseline CNP
# got injected here, flipping longhorn-system into default-deny and cutting the
# CSI sidecars off from the kube-apiserver (provisioner crash-loop, PVCs stuck
# Pending — a cluster-wide storage outage). It must remain excluded in all four
# lists. This drift is exactly what the guard now prevents.
# ============================================================================
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: generate-baseline-netpol
  annotations:
    policies.kyverno.io/title: Generate Baseline Network Policy
    policies.kyverno.io/category: Network
    policies.kyverno.io/description: >-
      For every tenant namespace, generate a CiliumNetworkPolicy that permits
      same-namespace pod-to-pod traffic and DNS to CoreDNS. The cluster-wide
      default-deny blocks everything else; this restores the minimum a normal
      app needs. synchronize keeps the generated policy in sync and recreates
      it if deleted.
spec:
  # generateExisting: true also generates the baseline CNP for namespaces that
  # already exist when the policy is installed, not just newly-created ones.
  generateExisting: true
  rules:
    - name: baseline-cnp
      match:
        any:
          - resources:
              kinds:
                - Namespace
      exclude:
        any:
          # Platform/system namespaces are exempt from default-deny and manage
          # their own connectivity — don't inject a baseline policy there.
          - resources:
              kinds:
                - Namespace
              names:
                - kube-system
                - kube-node-lease
                - kube-public
                - flux-system
                - kyverno
                - policy-reporter
                - headlamp
                - tsidp
                - cert-manager
                - external-secrets
                - tailscale
                - traefik
                - monitoring
                - trivy-system
                # Must stay in lockstep with the default-deny CCNP exclusions:
                # longhorn-system is excluded there, so it gets no kube-apiserver
                # egress allow — a baseline CNP here flips it into default-deny
                # and cuts the CSI sidecars off from the apiserver (2026-06-12
                # outage: provisioner crash-looped, PVCs stuck Pending).
                - longhorn-system
                # Cilium Gateway API trial: platform-managed, manages its own
                # connectivity — no baseline CNP. Lockstep with default-deny.
                - cilium-gateway
      generate:
        apiVersion: cilium.io/v2
        kind: CiliumNetworkPolicy
        name: baseline-allow
        namespace: "{{request.object.metadata.name}}"
        synchronize: true
        data:
          spec:
            description: >-
              Baseline connectivity managed by Kyverno: same-namespace traffic
              and DNS. Add app-specific allow rules in separate policies.
            endpointSelector: {}
            ingress:
              # All pods in this namespace may receive traffic from other pods
              # in the same namespace.
              - fromEndpoints:
                  - {}
            egress:
              # All pods in this namespace may reach other pods in the same
              # namespace.
              - toEndpoints:
                  - {}
              # DNS resolution against CoreDNS.
              - toEndpoints:
                  - matchLabels:
                      k8s:io.kubernetes.pod.namespace: kube-system
                      k8s:k8s-app: kube-dns
                toPorts:
                  - ports:
                      - port: "53"
                        protocol: UDP
                      - port: "53"
                        protocol: TCP
