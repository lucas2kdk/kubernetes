apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
  annotations:
    policies.kyverno.io/title: Disallow Latest Tag
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/description: >-
      Require an explicit image tag and reject the mutable ':latest' tag so
      GitOps deployments are reproducible and rollbacks are deterministic.
spec:
  background: true
  rules:
    - name: require-image-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-node-lease
                - kube-public
                - flux-system
          # Platform-managed namespaces carry the platform.io/managed label
          # (set on each platform/base/*/namespace.yaml). The system namespaces
          # above are not repo-managed, so they stay an explicit list.
          - resources:
              namespaceSelector:
                matchLabels:
                  platform.io/managed: "true"
      validate:
        failureAction: Audit
        message: "An explicit image tag is required."
        pattern:
          spec:
            containers:
              - image: "*:*"
    - name: validate-image-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-node-lease
                - kube-public
                - flux-system
          # Platform-managed namespaces carry the platform.io/managed label
          # (set on each platform/base/*/namespace.yaml). The system namespaces
          # above are not repo-managed, so they stay an explicit list.
          - resources:
              namespaceSelector:
                matchLabels:
                  platform.io/managed: "true"
      validate:
        failureAction: Audit
        message: "Using the mutable ':latest' image tag is not allowed."
        pattern:
          spec:
            containers:
              - image: "!*:latest"
