apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: flux-multi-tenancy
spec:
  validationFailureAction: Enforce
  rules:
    - name: serviceAccountName
      # Platform-managed namespaces are not tenants and run with cluster
      # privileges, so they are exempt from tenant isolation.
      exclude:
        any:
          # Platform-managed namespaces carry the platform.io/managed label
          # (set on each platform/base/*/namespace.yaml). flux-system is
          # bootstrapped by Flux itself and has no repo-managed namespace
          # manifest, so it stays an explicit entry.
          - resources:
              namespaceSelector:
                matchLabels:
                  platform.io/managed: "true"
          - resources:
              namespaces:
                - flux-system
      match:
        any:
          - resources:
              kinds:
                - Kustomization
                - HelmRelease
      validate:
        message: ".spec.serviceAccountName is required"
        pattern:
          spec:
            serviceAccountName: "?*"
    - name: kustomizationSourceRefNamespace
      exclude:
        any:
          # Platform-managed namespaces carry the platform.io/managed label
          # (set on each platform/base/*/namespace.yaml). flux-system is
          # bootstrapped by Flux itself and has no repo-managed namespace
          # manifest, so it stays an explicit entry.
          - resources:
              namespaceSelector:
                matchLabels:
                  platform.io/managed: "true"
          - resources:
              namespaces:
                - flux-system
      match:
        any:
          - resources:
              kinds:
                - Kustomization
      preconditions:
        any:
          - key: "{{ request.object.spec.sourceRef.namespace || '' }}"
            operator: NotEquals
            value: ""
      validate:
        message: "spec.sourceRef.namespace must be the same as metadata.namespace"
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.sourceRef.namespace }}"
                operator: NotEquals
                value: "{{ request.object.metadata.namespace }}"
    - name: helmReleaseSourceRefNamespace
      exclude:
        any:
          # Platform-managed namespaces carry the platform.io/managed label
          # (set on each platform/base/*/namespace.yaml). flux-system is
          # bootstrapped by Flux itself and has no repo-managed namespace
          # manifest, so it stays an explicit entry.
          - resources:
              namespaceSelector:
                matchLabels:
                  platform.io/managed: "true"
          - resources:
              namespaces:
                - flux-system
      match:
        any:
          - resources:
              kinds:
                - HelmRelease
      preconditions:
        any:
          - key: "{{ request.object.spec.chart.spec.sourceRef.namespace || '' }}"
            operator: NotEquals
            value: ""
      validate:
        message: "spec.chart.spec.sourceRef.namespace must be the same as metadata.namespace"
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.chart.spec.sourceRef.namespace }}"
                operator: NotEquals
                value: "{{ request.object.metadata.namespace }}"
