apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: flux-multi-tenancy
spec:
  validationFailureAction: Enforce
  rules:
    - name: serviceAccountName
      # Platform-managed namespaces are not tenants and run with cluster
      # privileges, so they are exempt from tenant isolation.
      exclude:
        any:
          - resources:
              namespaces:
                - flux-system
                - kyverno
                - policy-reporter
                - headlamp
                - cert-manager
                - external-secrets
                - tailscale
                - traefik
                - monitoring
                - netdata
                - vector
      match:
        any:
          - resources:
              kinds:
                - Kustomization
                - HelmRelease
      validate:
        message: ".spec.serviceAccountName is required"
        pattern:
          spec:
            serviceAccountName: "?*"
    - name: kustomizationSourceRefNamespace
      exclude:
        any:
          - resources:
              namespaces:
                - flux-system
                - kyverno
                - policy-reporter
                - headlamp
                - cert-manager
                - external-secrets
                - tailscale
                - traefik
                - monitoring
                - netdata
                - vector
      match:
        any:
          - resources:
              kinds:
                - Kustomization
      preconditions:
        any:
          - key: "{{ request.object.spec.sourceRef.namespace || '' }}"
            operator: NotEquals
            value: ""
      validate:
        message: "spec.sourceRef.namespace must be the same as metadata.namespace"
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.sourceRef.namespace }}"
                operator: NotEquals
                value: "{{ request.object.metadata.namespace }}"
    - name: helmReleaseSourceRefNamespace
      exclude:
        any:
          - resources:
              namespaces:
                - flux-system
                - kyverno
                - policy-reporter
                - headlamp
                - cert-manager
                - external-secrets
                - tailscale
                - traefik
                - monitoring
                - netdata
                - vector
      match:
        any:
          - resources:
              kinds:
                - HelmRelease
      preconditions:
        any:
          - key: "{{ request.object.spec.chart.spec.sourceRef.namespace || '' }}"
            operator: NotEquals
            value: ""
      validate:
        message: "spec.chart.spec.sourceRef.namespace must be the same as metadata.namespace"
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.chart.spec.sourceRef.namespace }}"
                operator: NotEquals
                value: "{{ request.object.metadata.namespace }}"
