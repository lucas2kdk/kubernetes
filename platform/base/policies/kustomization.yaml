# The Kyverno ClusterPolicy set — the tenant-facing guardrails. Reconciled by
# platform/fleet/kyverno-policies.yaml (dependsOn: kyverno, so the CRDs and webhook
# exist first). flux-multi-tenancy is Enforce; the Tier-1 baseline policies below
# are Audit until reports are clean. generate-baseline-netpol + its RBAC restore
# minimal connectivity under the Cilium default-deny.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - flux-multi-tenancy.yaml
  # Tier 1 baseline policies — rolled out as Audit; promote to Enforce
  # per-environment via overlays once policy reports are clean.
  - pod-security-baseline.yaml
  - pod-security-restricted.yaml
  - disallow-default-namespace.yaml
  - require-requests.yaml
  - disallow-latest-tag.yaml
  - require-pod-probes.yaml
  # Network: generate a baseline same-namespace + DNS CiliumNetworkPolicy for
  # every tenant namespace (plus the RBAC Kyverno needs to manage them).
  - kyverno-cilium-rbac.yaml
  - generate-baseline-netpol.yaml
