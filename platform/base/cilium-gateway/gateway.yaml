# Cilium Gateway. gatewayClassName: cilium resolves to the GatewayClass that the
# Cilium operator auto-creates when gatewayAPI.enabled=true (set in Terraform,
# cluster-addons/main.tf). Cilium provisions an Envoy-backed LoadBalancer Service
# (cilium-gateway-cilium-gw) that draws its IPv6 from ip-pool.yaml.
#
# Two listeners: :80 only carries the HTTP→HTTPS redirect (http-redirect.yaml),
# and :443 terminates TLS with the cert-manager cert (certificate.yaml) and
# serves the app route (httproute.yaml). The reserved:ingress proxy identity is
# allowed through default-deny by platform/base/network/allow-gateway-proxy.yaml.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: cilium-gw
  namespace: cilium-gateway
spec:
  gatewayClassName: cilium
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      # Must match the redirect route's hostname: with a catch-all (hostname-less)
      # listener Cilium renders an empty insecure route config and plain HTTP 404s
      # instead of redirecting. Verified on prod 2026-06-15 — adding this flips it
      # from 404 to 301→https.
      hostname: draw.rosenvold.tech
      allowedRoutes:
        # Same: only HTTPRoutes in this namespace may attach. No cross-namespace
        # ReferenceGrant needed — the routes + backend live here too.
        namespaces:
          from: Same
    - name: https
      protocol: HTTPS
      port: 443
      hostname: draw.rosenvold.tech
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: draw-rosenvold-tech-tls
      allowedRoutes:
        namespaces:
          from: Same
