# Redirect all plaintext :80 traffic to HTTPS (301). Attaches only to the http
# listener; the app route (httproute.yaml) owns the https listener.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: excalidraw-https-redirect
  namespace: cilium-gateway
spec:
  parentRefs:
    - name: cilium-gw
      sectionName: http
  hostnames:
    - draw.rosenvold.tech
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
