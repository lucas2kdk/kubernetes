# App route: serves Excalidraw over the HTTPS listener only (sectionName: https).
# Plain HTTP is handled by http-redirect.yaml, which 301s to https. Reach it at
# https://draw.rosenvold.tech (AAAA → the Gateway IP 2a01:4f8:173:2015::100).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: excalidraw
  namespace: cilium-gateway
spec:
  parentRefs:
    - name: cilium-gw
      sectionName: https
  hostnames:
    - draw.rosenvold.tech
  rules:
    - backendRefs:
        - name: excalidraw
          port: 80
