apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - ip-pool.yaml
  - certificate.yaml
  - gateway.yaml
  # http-redirect (HTTP->HTTPS) stays here: it's listener-level config bound to
  # the http listener, not the app. The app route now lives with the excalidraw
  # tenant (tenants/base/excalidraw/httproute.yaml).
  - http-redirect.yaml
