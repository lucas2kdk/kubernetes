# Namespace for Trivy Operator. platform.io/managed exempts it from the Kyverno
# pod policies. NOTE: the namespace is `trivy-system` but the Cilium NotIn lists
# and generate-baseline-netpol use `trivy-system` too — keep that exact spelling
# in all four lists (the default-deny exemption is by name there, not by label).
apiVersion: v1
kind: Namespace
metadata:
  name: trivy-system
  labels:
    platform.io/managed: "true"
