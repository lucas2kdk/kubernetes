apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  interval: 1h
  releaseName: external-secrets
  chart:
    spec:
      chart: external-secrets
      version: "0.20.4" # Renovate-managed. 0.20.x serves external-secrets.io/v1;
      # the 2.x chart line drops v1beta1 — migrate the remaining v1beta1
      # manifests (cluster-secret-store.yaml, tailscale external-secret.yaml)
      # before taking that bump.
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    installCRDs: true
    # The `vault` ClusterSecretStore (cluster-secret-store.yaml) targets HashiCorp Vault
    # (DO App Platform). Vault's per-cluster kubernetes auth backend, role and policy, and
    # the secret/ KV engine (layout: secret/platform/*, secret/tenants/<tenant>/*) are
    # managed by Terraform; each overlay patches the auth mountPath to kubernetes/<cluster>.
