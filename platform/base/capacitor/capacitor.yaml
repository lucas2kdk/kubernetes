# Capacitor — the Flux GitOps dashboard UI (gimlet-io). A read-only web view of
# the cluster's Flux objects (Kustomizations, HelmReleases, sources) and their
# reconcile status, useful for debugging the fleet's dependsOn graph.
#
# Self-managing: instead of a HelmRelease in a base, this pulls the upstream
# OCI-packaged manifests and reconciles them with a nested Flux Kustomization
# (path "./") into flux-system. semver ">=0.1.0" tracks the latest published tag.
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: capacitor
  namespace: flux-system
spec:
  interval: 12h
  url: oci://ghcr.io/gimlet-io/capacitor-manifests
  ref:
    semver: ">=0.1.0"
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: capacitor-manifests
  namespace: flux-system
spec:
  targetNamespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  wait: true
  prune: true
  path: "./"
  sourceRef:
    kind: OCIRepository
    name: capacitor
