apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../base/external-secrets

# Point the Vault ClusterSecretStore at this cluster's Vault kubernetes auth mount.
patches:
  - target:
      kind: ClusterSecretStore
      name: vault
    patch: |
      - op: replace
        path: /spec/provider/vault/auth/kubernetes/mountPath
        value: kubernetes/prod-fsn
