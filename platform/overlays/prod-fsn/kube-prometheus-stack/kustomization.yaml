# prod-fsn overlay: the shared kube-prometheus-stack base plus cross-cluster
# federation. prod runs the only Grafana; this pulls test-home's metrics into
# prod's Prometheus over the tailnet so they show up in that one Grafana.
# test-home exposes its Prometheus at prometheus-test.<tailnet>.ts.net (see
# overlays/test-home/kube-prometheus-stack); the egress Service below gives
# prod's in-cluster Prometheus a ClusterIP route to it, and the scrape config
# federates /federate, tagging the series cluster=test-home.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../base/kube-prometheus-stack
  - federate-egress-service.yaml
patches:
  - target:
      kind: HelmRelease
      name: kube-prometheus-stack
    patch: |
      # Second Grafana datasource so dashboards can switch clusters from their
      # `datasource` template variable (the chart provisions the local one,
      # uid=prometheus, as default). Points at the same egress Service the
      # federation job uses to reach test-home's Prometheus over the tailnet;
      # the proxy presents test-home's MagicDNS cert, not the svc name, so
      # tlsSkipVerify — traffic is already tailnet-encrypted.
      - op: add
        path: /spec/values/grafana/additionalDataSources
        value:
          - name: Prometheus (test-home)
            type: prometheus
            uid: prometheus-test-home
            access: proxy
            url: https://prometheus-test-federate.monitoring.svc:443
            isDefault: false
            jsonData:
              tlsSkipVerify: true
      - op: add
        path: /spec/values/prometheus/prometheusSpec/additionalScrapeConfigs
        value:
          - job_name: federate-test-home
            honor_labels: true
            scheme: https
            metrics_path: /federate
            params:
              "match[]":
                - '{job!=""}'
            tls_config:
              server_name: prometheus-test.${tailnet}.ts.net
            static_configs:
              - targets:
                  - prometheus-test-federate.monitoring.svc:443
                labels:
                  cluster: test-home
