apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../base/tailscale-operator
patches:
  - target:
      kind: HelmRelease
      name: tailscale-operator
    patch: |
      - op: replace
        path: /spec/values/operatorConfig/hostname
        value: k8s-api-test-home
