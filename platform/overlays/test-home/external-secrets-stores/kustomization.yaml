apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../base/external-secrets-stores

# test-home runs on a home LAN, so its apiserver isn't reachable from
# vault.rosenvold.tech and Kubernetes auth (which always issues a TokenReview
# callback on Vault >= 1.16) fails with 403. Swap the entire auth block for
# AppRole, whose role_id/secret_id are written into the vault-approle Secret
# by bootstrap/terraform/clusters/test-home/vault.tf.
patches:
  - target:
      kind: ClusterSecretStore
      name: vault
    patch: |
      - op: remove
        path: /spec/provider/vault/auth/kubernetes
      - op: add
        path: /spec/provider/vault/auth/appRole
        value:
          path: approle/test-home
          roleRef:
            name: vault-approle
            namespace: external-secrets
            key: role_id
          secretRef:
            name: vault-approle
            namespace: external-secrets
            key: secret_id
