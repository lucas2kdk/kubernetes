apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../base/tailscale-operator
patches:
  # Distinct tailnet name per cluster: this is the kubectl API endpoint
  # (https://k8s-api-dev.<tailnet>.ts.net).
  - target:
      kind: HelmRelease
      name: tailscale-operator
    patch: |
      - op: replace
        path: /spec/values/operatorConfig/hostname
        value: k8s-api-dev
