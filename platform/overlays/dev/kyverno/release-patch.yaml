apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno
spec:
  values:
    # Dev-only: re-scan policy reports every 15m instead of the 1h default,
    # for faster feedback while iterating on policies. backgroundScanInterval
    # is a reports-controller flag, not a background-controller one.
    reportsController:
      extraArgs:
        backgroundScanInterval: 15m
