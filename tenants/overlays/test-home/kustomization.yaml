# Per-cluster tenant presence for test-home. No tenant apps currently run here:
# hello-world (the former smoke-test) was retired, and excalidraw/gitlab are
# prod-only. References the (empty) base as the seam for future tenants.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
