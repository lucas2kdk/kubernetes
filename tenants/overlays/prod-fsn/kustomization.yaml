# Per-cluster tenant presence for prod-fsn — which tenant apps run here. The
# only diff from base is the ingress host (hello-world-prod) so the tailscale
# hostname is unique per cluster.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  - target:
      group: helm.toolkit.fluxcd.io
      version: v2
      kind: HelmRelease
      name: hello-world
    patch: |-
      - op: replace
        path: /spec/values/ingress/host
        value: hello-world-prod
