# Per-cluster tenant presence for prod-fsn — which tenant apps run here. The
# hello-world diff from base is the ingress host (hello-world-prod) so the
# tailscale hostname is unique per cluster.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  # excalidraw is prod-only: it is exposed through the Cilium Gateway, which only
  # exists on prod-fsn. Pulled here rather than from tenants/base so test-home
  # (no Gateway) doesn't get an unroutable workload.
  - ../../base/excalidraw
  # GitLab CE is prod-only: heavy single-node workload exposed on the prod tailnet.
  - ../../base/gitlab
patches:
  - target:
      group: helm.toolkit.fluxcd.io
      version: v2
      kind: HelmRelease
      name: hello-world
    patch: |-
      - op: replace
        path: /spec/values/ingress/host
        value: hello-world-prod
