# Let the Tailscale proxy reach GitLab through default-deny. As a tenant
# namespace, gitlab gets only the Kyverno-generated baseline CNP (same-namespace
# + DNS), so traffic forwarded by the Tailscale operator's proxy pods (which run
# in the tailscale namespace) would be dropped. There is no clusterwide
# allow-ingress-from-tailscale policy, so this scoped CNP allows it in — to the
# webservice (HTTP :8181) and gitlab-shell (SSH :2222). Cilium policies are
# additive: this stacks on the baseline, it does not replace it.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-tailscale-ingress
  namespace: gitlab
spec:
  endpointSelector: {} # any gitlab pod; the source restriction below is the real fence
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: tailscale
      toPorts:
        - ports:
            - port: "8181"
              protocol: TCP
            - port: "2222"
              protocol: TCP
---
# Internet egress for the gitlab namespace. CI job pods (kubernetes executor)
# and GitLab itself need to reach external hosts (git clone, apt/npm/pip, repo
# imports, etc.) over HTTP/S — default-deny + the Kyverno baseline only permit
# same-namespace + DNS. The cloud-metadata endpoint stays blocked by the
# separate clusterwide deny-cloud-metadata policy (egressDeny wins).
# ponytail: 80/443 covers the vast majority of CI traffic — widen ports if a
# job needs something else.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress-internet
  namespace: gitlab
spec:
  endpointSelector: {}
  egress:
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
            - port: "443"
              protocol: TCP
---
# Let the platform DB operators manage their instances in this namespace through
# default-deny. The operators run in their own (default-deny-exempt) namespaces
# but their traffic still lands on gitlab pods, which only get the baseline CNP.
# CloudNativePG connects to each Postgres instance's manager on :8000; the Redis
# operator reconciles the Redis pod on :6379; the MinIO operator manages the
# Tenant pods on :9000/:9090. Scoped to the operator namespaces.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-db-operators
  namespace: gitlab
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: cnpg-system
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: redis-operator
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: minio-operator
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
            - port: "9090"
              protocol: TCP
