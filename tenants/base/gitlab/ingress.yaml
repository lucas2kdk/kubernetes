# Expose the GitLab web UI on the tailnet only — no public DNS, no public
# ingress. The Tailscale operator provisions a proxy device named "gitlab"
# (tag:k8s) serving HTTPS with a tailnet cert at https://gitlab.<tailnet>.ts.net
# and forwards plain HTTP to the chart's webservice (workhorse, :8181).
# Requires MagicDNS + HTTPS certs on the tailnet and an ACL allowing tag:k8s:443.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gitlab
  namespace: gitlab
  # Auto-register on the homepage dashboard (explicit href — defaultBackend
  # ingress has no host rules for homepage to infer the URL from). ${tailnet} is
  # substituted via clusters/*/tenants.yaml's fleet-vars substituteFrom.
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: GitLab
    gethomepage.dev/description: Source & CI
    gethomepage.dev/group: Tenants
    gethomepage.dev/icon: gitlab.png
    gethomepage.dev/href: "https://gitlab.${tailnet}.ts.net"
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: gitlab-webservice-default
      port:
        number: 8181
  tls:
    - hosts:
        - gitlab # device name; Tailscale provisions the cert, no secret needed
