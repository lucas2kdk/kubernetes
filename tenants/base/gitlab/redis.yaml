# Redis for GitLab, declared via the platform Redis operator (chart 10 / GitLab
# 19 dropped the bundled Redis). Standalone single instance — fine for one node.
# The operator creates a "gitlab-redis" Service on :6379 that the HelmRelease
# points global.redis at. PVC lands on the default longhorn StorageClass.
# ponytail: passwordless — Redis has no external exposure and same-namespace
# traffic is all that reaches it. Add a redisSecret if that ever changes.
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: Redis
metadata:
  name: gitlab-redis
  namespace: gitlab
spec:
  kubernetesConfig:
    image: quay.io/opstree/redis:v7.0.15 # Renovate-managed
    imagePullPolicy: IfNotPresent
    resources: # Kyverno require-requests
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 256Mi
  # redis_exporter sidecar so Prometheus has Redis metrics for the gitlab tenant
  # (the gnetId 763 Grafana dashboard reads these). The operator exposes :9121 on
  # a dedicated "gitlab-redis-metrics" Service and scrapes it via the redis
  # ServiceMonitor (redis-servicemonitor.yaml). Using oliver006's upstream image
  # directly rather than the operator's quay.io/opstree fork — same exporter,
  # tracked by Renovate against a fixed ref.
  redisExporter:
    enabled: true
    image: quay.io/oliver006/redis_exporter:v1.86.0 # Renovate-managed
    imagePullPolicy: IfNotPresent
    resources: # Kyverno require-requests
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        memory: 64Mi
  # fsGroup makes the (root-owned) longhorn PVC writable by the non-root redis
  # process — without it redis can't create its append-only dir and crashloops.
  # The container securityContext satisfies the restricted PodSecurity / Kyverno.
  podSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    runAsNonRoot: true
  securityContext:
    runAsUser: 1000
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
  storage:
    volumeClaimTemplate:
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
