# Postgres for GitLab, declared via the platform CloudNativePG operator (chart 10
# / GitLab 19 dropped the bundled DB). Single instance (single-node cluster);
# PVC lands on the default longhorn StorageClass. CNPG generates the
# gitlab-postgres-app Secret (user "gitlab" + password) that the HelmRelease
# points global.psql at.
#
# Single database (gitlabhq_production): GitLab's "main" and "ci" connections
# both point here — a separate CI database is gated behind
# GITLAB_ALLOW_SEPARATE_CI_DATABASE and flagged not-production-ready. The
# pg_trgm and btree_gist extensions can't be created by the non-superuser owner,
# so the superuser pre-creates them via postInitApplicationSQL. Postgres is
# pinned to 17 (GitLab 19's minimum).
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: gitlab-postgres
  namespace: gitlab
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17 # Renovate-managed (GitLab 19 requires PG >= 17)
  storage:
    size: 20Gi
  bootstrap:
    initdb:
      database: gitlabhq_production
      owner: gitlab
      postInitApplicationSQL:
        - CREATE EXTENSION IF NOT EXISTS pg_trgm;
        - CREATE EXTENSION IF NOT EXISTS btree_gist;
