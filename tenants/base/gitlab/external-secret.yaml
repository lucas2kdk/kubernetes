# Initial root password for GitLab, stored at secret/platform/gitlab in Vault
# (key: root_password) and synced into the gitlab-initial-root-password Secret
# that the HelmRelease's global.initialRootPassword references. The Vault
# eso-platform role grants read on secret/platform/*.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-initial-root-password
  namespace: gitlab
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: gitlab-initial-root-password
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: platform/gitlab
        property: root_password
