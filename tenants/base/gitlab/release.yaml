# GitLab CE via the official cloud-native umbrella chart. Bundled
# Postgres/Redis/MinIO/Gitaly are kept; the chart's own nginx-ingress,
# cert-manager and Prometheus are DISABLED so GitLab coexists with the platform
# (we expose it via the Tailscale operator and scrape via kube-prometheus-stack
# later). All PVCs land on the default StorageClass, which is longhorn.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitlab
  namespace: gitlab
spec:
  interval: 1h
  serviceAccountName: gitlab # impersonate the tenant SA -> stays within tenant RBAC
  releaseName: gitlab
  chart:
    spec:
      chart: gitlab
      version: "10.0.2" # Renovate-managed (appVersion v19.0.2)
      sourceRef:
        kind: HelmRepository
        name: gitlab
        namespace: gitlab
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  # GitLab takes a long time to install on a single node; give it room.
  timeout: 30m
  values:
    global:
      hosts:
        # ${tailnet} is substituted by Flux from the fleet-vars ConfigMap (the
        # substituteFrom was added to clusters/prod-fsn/tenants.yaml for this).
        domain: ${tailnet}.ts.net
        https: true # emit https:// URLs; TLS actually terminates at the Tailscale proxy
        gitlab:
          name: gitlab.${tailnet}.ts.net
        ssh: gitlab-ssh.${tailnet}.ts.net # advertised git clone host (ssh-service.yaml)
      ingress:
        enabled: false # we ship our own tailscale Ingress (ingress.yaml), not the chart's
        configureCertmanager: false # platform cert-manager / Tailscale handles TLS
      # Chart 10 (GitLab 19) defaults to an envoy-gateway / Gateway-API ingress
      # stack whose subchart installs cluster-scoped Gateway API CRDs — which the
      # namespace-scoped tenant SA cannot (and shouldn't) create. We front GitLab
      # with the Tailscale operator instead, so disable the chart's gateway whole.
      gatewayApi:
        enabled: false
        installEnvoy: false
        configureCertmanager: false # else the certmanager-issuer subchart still renders
      shell:
        port: 22 # matches the Tailscale LoadBalancer in ssh-service.yaml
      # Render ServiceMonitor/PodMonitor objects so the platform
      # kube-prometheus-stack scrapes GitLab. The CRDs already exist cluster-wide
      # and Prometheus discovers ServiceMonitors across namespaces; the
      # allow-ingress-from-monitoring clusterwide policy lets it reach gitlab pods.
      # (We still keep the chart's own bundled Prometheus off — see prometheus.install.)
      monitoring:
        enabled: true
      # Initial root password sourced from Vault via external-secret.yaml.
      initialRootPassword:
        secret: gitlab-initial-root-password
        key: password
      # External Postgres: the CloudNativePG cluster in postgres.yaml. Single
      # database: GitLab's "ci" connection points at the SAME database as "main"
      # (gitlabhq_production). A *separate* CI database is gated behind
      # GITLAB_ALLOW_SEPARATE_CI_DATABASE and flagged "not ready for production",
      # so we use the supported single-database layout. Host is the CNPG
      # read-write Service; the CNPG-generated gitlab-postgres-app secret auths.
      psql:
        password:
          useSecret: true
          secret: gitlab-postgres-app
          key: password
        main:
          host: gitlab-postgres-rw
          port: 5432
          username: gitlab
          database: gitlabhq_production
        ci:
          host: gitlab-postgres-rw
          port: 5432
          username: gitlab
          database: gitlabhq_production
      # External Redis: the operator-managed instance in redis.yaml. Passwordless
      # (see the comment there), so disable auth.
      redis:
        host: gitlab-redis
        port: 6379
        auth:
          enabled: false
      # External object storage (the MinIO Tenant in minio.yaml). Consolidated
      # form: one connection secret (object-storage-secrets.yaml) + a bucket per
      # data type. Registry and backups need their own secret formats (below).
      appConfig:
        # SSO via tsidp (the platform Tailscale OIDC provider). The provider YAML
        # is rendered into the gitlab-oidc-provider Secret (oidc-secret.yaml).
        # allowSingleSignOn auto-creates accounts on first login; autoLinkUser
        # links to an existing account by email. blockAutoCreatedUsers stays
        # false since only tailnet identities can authenticate through tsidp.
        omniauth:
          enabled: true
          allowSingleSignOn: ["openid_connect"]
          blockAutoCreatedUsers: false
          autoLinkUser: ["openid_connect"]
          providers:
            - secret: gitlab-oidc-provider
              key: provider
        object_store:
          enabled: true
          proxy_download: true
          connection:
            secret: gitlab-objectstore-connection
            key: connection
        lfs:
          bucket: gitlab-lfs
        artifacts:
          bucket: gitlab-artifacts
        uploads:
          bucket: gitlab-uploads
        packages:
          bucket: gitlab-packages
        externalDiffs:
          bucket: gitlab-mr-diffs
        terraformState:
          bucket: gitlab-terraform-state
        ciSecureFiles:
          bucket: gitlab-ci-secure-files
        dependencyProxy:
          bucket: gitlab-dependency-proxy
        backups:
          bucket: gitlab-backups
          tmpBucket: gitlab-tmp
    # Use the platform cert-manager, not the chart's bundled one (its subchart
    # also installs cluster-scoped CRDs the tenant SA can't create).
    # installCertmanager supersedes the old certmanager.install key in chart 10.
    installCertmanager: false
    nginx-ingress:
      enabled: false
    prometheus:
      install: false
    gitlab-runner:
      # Bundled runner, Kubernetes executor (chart default): one ephemeral pod
      # per CI job, so capacity scales with the node. The parent chart
      # auto-registers it against the in-cluster GitLab; rbac.create spawns the
      # job pods. CI jobs need internet egress — see allow-egress-internet in
      # netpol.yaml.
      install: true
      # Register against the in-cluster webservice, not the external tailnet host
      # (gitlab.<tailnet>.ts.net) — that MagicDNS name isn't resolvable by the
      # cluster CoreDNS, so registration fails with "no such host". Internal HTTP.
      gitlabUrl: http://gitlab-webservice-default.gitlab.svc.cluster.local:8181
      runners:
        # Make every CI job pod (build + helper) satisfy the restricted
        # PodSecurity profile so they're admitted once that policy is enforced —
        # and so the rootless-builder path (e.g. moby/buildkit:rootless on uid
        # 1000) is the natural way to build images here, no privileged/DinD. The
        # seccompProfile is added cluster-wide by the add-seccomp-runtime-default
        # Kyverno mutate, so it isn't set here.
        config: |
          [[runners]]
            [runners.kubernetes]
              image = "ubuntu:22.04"
              [runners.kubernetes.pod_security_context]
                run_as_non_root = true
                run_as_user = 1000
                run_as_group = 1000
                fs_group = 1000
              [runners.kubernetes.build_container_security_context]
                run_as_non_root = true
                run_as_user = 1000
                allow_privilege_escalation = false
                [runners.kubernetes.build_container_security_context.capabilities]
                  drop = ["ALL"]
              [runners.kubernetes.helper_container_security_context]
                run_as_non_root = true
                run_as_user = 1000
                allow_privilege_escalation = false
                [runners.kubernetes.helper_container_security_context.capabilities]
                  drop = ["ALL"]
      rbac:
        # The chart's default runner Role grants core-group */* — which the
        # namespaced-admin tenant SA can't create (RBAC escalation prevention:
        # you can't grant what you don't hold). Scope it to exactly what the
        # Kubernetes executor needs; every rule here is a subset of the `admin`
        # ClusterRole bound to the gitlab SA, so the grant is allowed.
        rules:
          - apiGroups: [""]
            resources: ["pods", "pods/exec", "pods/attach", "configmaps", "secrets", "services"]
            verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
          - apiGroups: [""]
            resources: ["pods/log"]
            verbs: ["get", "list", "watch"]
          - apiGroups: [""]
            resources: ["events"]
            verbs: ["list", "watch"]
    # Container registry object storage: docker/distribution S3 driver, its own
    # secret format (object-storage-secrets.yaml).
    registry:
      storage:
        secret: gitlab-registry-storage
        key: config
    # Toolbox backups to object storage: s3cmd config secret.
    gitlab:
      toolbox:
        backups:
          objectStorage:
            config:
              secret: gitlab-backup-storage
              key: config
