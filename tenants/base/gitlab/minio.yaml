# S3-compatible object storage for GitLab, declared via the platform MinIO
# operator (chart 10 / GitLab 19 dropped bundled object storage and now requires
# external S3 for artifacts, LFS, uploads, packages, the registry and backups).
# Single server / single drive — fine for one node (no erasure coding). TLS off:
# the operator exposes the S3 API as the in-namespace "minio" Service on :80, and
# GitLab talks to it over plain HTTP within the namespace (no external exposure).
# Root credentials come from the gitlab-objstore-config Secret (object-storage-
# secrets.yaml). Buckets are auto-created by the operator.
apiVersion: minio.min.io/v2
kind: Tenant
metadata:
  name: gitlab-objstore
  namespace: gitlab
spec:
  configuration:
    name: gitlab-objstore-config # Secret with config.env (MINIO_ROOT_USER/PASSWORD)
  requestAutoCert: false
  # Serve the Prometheus metrics endpoints (/minio/v2/metrics/*) without auth so
  # an in-cluster Prometheus can scrape them with a plain ServiceMonitor (minio-
  # servicemonitor.yaml). Default is "jwt", which requires a bearer token minted
  # from the root creds and makes ServiceMonitor scraping awkward. Safe here: the
  # metrics carry no object data (only capacity/health/op counters), the endpoint
  # is reachable only inside the netpol-isolated gitlab namespace, and the only
  # allowed cross-namespace ingress to :9000 is from `monitoring` (netpol.yaml).
  env:
    - name: MINIO_PROMETHEUS_AUTH_TYPE
      value: public
  pools:
    - name: pool-0
      servers: 1
      volumesPerServer: 1
      # restricted PodSecurity: the operator already sets a compliant pod-level
      # securityContext (runAsNonRoot, fsGroup, RuntimeDefault), but the MinIO
      # container is missing allowPrivilegeEscalation:false + dropped caps. Set
      # them so the pod passes the restricted profile under Enforce.
      containerSecurityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      volumeClaimTemplate:
        metadata:
          name: data
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 50Gi # default longhorn StorageClass
  buckets:
    - name: gitlab-artifacts
    - name: gitlab-lfs
    - name: gitlab-uploads
    - name: gitlab-packages
    - name: gitlab-mr-diffs
    - name: gitlab-terraform-state
    - name: gitlab-ci-secure-files
    - name: gitlab-dependency-proxy
    - name: gitlab-registry
    - name: gitlab-backups
    - name: gitlab-tmp
