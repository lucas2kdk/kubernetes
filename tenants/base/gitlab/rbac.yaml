# Tenant ServiceAccount + RoleBinding. The HelmRelease impersonates this SA
# (spec.serviceAccountName in release.yaml), and the binding is namespace-scoped
# admin — so Flux applies GitLab's manifests confined to its own namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitlab
  namespace: gitlab
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitlab
  namespace: gitlab
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
  - kind: ServiceAccount
    name: gitlab
    namespace: gitlab
