# GitLab OmniAuth OIDC provider for tsidp (the platform Tailscale identity
# provider, issuer https://idp.<tailnet>.ts.net — same one Headlamp uses).
# The GitLab chart wants a Secret whose `provider` key holds the full provider
# YAML, so we render it here from the tsidp client credentials in Vault
# (secret/platform/gitlab-oidc: client_id, client_secret). ${tailnet} is
# substituted by Flux (fleet-vars); {{ }} is ESO templating — they don't clash.
#
# Register the client in tsidp first (dynamic registration, persisted on its
# hostPath) with redirect URI:
#   https://gitlab.<tailnet>.ts.net/users/auth/openid_connect/callback
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-oidc-provider
  namespace: gitlab
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: gitlab-oidc-provider
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        provider: |
          name: openid_connect
          label: Tailscale
          args:
            name: openid_connect
            scope:
              - openid
              - profile
              - email
            response_type: code
            issuer: https://idp.${tailnet}.ts.net
            discovery: true
            client_auth_method: basic
            uid_field: sub
            client_options:
              identifier: {{ .client_id }}
              secret: {{ .client_secret }}
              redirect_uri: https://gitlab.${tailnet}.ts.net/users/auth/openid_connect/callback
  data:
    - secretKey: client_id
      remoteRef:
        key: platform/gitlab-oidc
        property: client_id
    - secretKey: client_secret
      remoteRef:
        key: platform/gitlab-oidc
        property: client_secret
