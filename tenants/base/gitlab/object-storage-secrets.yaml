# Object-storage credentials for GitLab + MinIO, all derived from one Vault
# entry (secret/platform/gitlab-objstore: access_key, secret_key) but rendered
# into the four different formats each consumer needs:
#   1. config.env       — MinIO Tenant root creds (minio.yaml)
#   2. rails connection — GitLab consolidated object storage (global.appConfig)
#   3. registry config  — docker/distribution S3 driver (registry.storage)
#   4. s3cmd config     — toolbox backups (gitlab.toolbox.backups.objectStorage)
# Endpoint is the in-namespace MinIO API Service over plain HTTP (TLS is off).
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-objstore-config
  namespace: gitlab
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: gitlab-objstore-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        config.env: |
          export MINIO_ROOT_USER="{{ .access_key }}"
          export MINIO_ROOT_PASSWORD="{{ .secret_key }}"
  data:
    - secretKey: access_key
      remoteRef:
        key: platform/gitlab-objstore
        property: access_key
    - secretKey: secret_key
      remoteRef:
        key: platform/gitlab-objstore
        property: secret_key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-objectstore-connection
  namespace: gitlab
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: gitlab-objectstore-connection
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        connection: |
          provider: AWS
          region: us-east-1
          aws_access_key_id: {{ .access_key }}
          aws_secret_access_key: {{ .secret_key }}
          endpoint: http://minio.gitlab.svc.cluster.local
          path_style: true
  data:
    - secretKey: access_key
      remoteRef:
        key: platform/gitlab-objstore
        property: access_key
    - secretKey: secret_key
      remoteRef:
        key: platform/gitlab-objstore
        property: secret_key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-registry-storage
  namespace: gitlab
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: gitlab-registry-storage
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        config: |
          s3:
            accesskey: {{ .access_key }}
            secretkey: {{ .secret_key }}
            bucket: gitlab-registry
            region: us-east-1
            regionendpoint: http://minio.gitlab.svc.cluster.local
            pathstyle: true
            v4auth: true
  data:
    - secretKey: access_key
      remoteRef:
        key: platform/gitlab-objstore
        property: access_key
    - secretKey: secret_key
      remoteRef:
        key: platform/gitlab-objstore
        property: secret_key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-backup-storage
  namespace: gitlab
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: gitlab-backup-storage
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        config: |
          [default]
          access_key = {{ .access_key }}
          secret_key = {{ .secret_key }}
          bucket_location = us-east-1
          host_base = minio.gitlab.svc.cluster.local
          host_bucket = minio.gitlab.svc.cluster.local/%(bucket)
          use_https = False
  data:
    - secretKey: access_key
      remoteRef:
        key: platform/gitlab-objstore
        property: access_key
    - secretKey: secret_key
      remoteRef:
        key: platform/gitlab-objstore
        property: secret_key
