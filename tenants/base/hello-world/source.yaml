# Tenant's own app repo (separate from the fleet repo). Lives in the tenant
# namespace, so the flux-multi-tenancy ClusterPolicy lets the HelmRelease
# reference it — cross-namespace source refs are blocked by that guardrail.
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: hello-world
  namespace: hello-world
spec:
  interval: 5m
  url: https://github.com/lucas2kdk/hailmary-helloworld
  ref:
    branch: main
  # Sparse-checkout: only /chart/ is pulled (the HelmRelease chart path).
  ignore: |
    /*
    !/chart/
