# Tenant workload. ingress.host here is the base default; each cluster's overlay
# patches it (hello-world-prod / hello-world-test) so the tailscale ingress
# hostnames don't collide across clusters.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hello-world
  namespace: hello-world
spec:
  interval: 1h
  serviceAccountName: hello-world # impersonate the tenant SA -> stays within tenant RBAC
  releaseName: hello-world
  chart:
    spec:
      chart: ./chart
      sourceRef:
        kind: GitRepository
        name: hello-world
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    ingress:
      enabled: true
      className: tailscale
      host: hello-world
      path: /
      pathType: Prefix
