apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hello-world
  namespace: hello-world
spec:
  interval: 1h
  serviceAccountName: hello-world
  releaseName: hello-world
  chart:
    spec:
      chart: ./chart
      sourceRef:
        kind: GitRepository
        name: hello-world
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    ingress:
      enabled: true
      className: tailscale
      host: hello-world
      path: /
      pathType: Prefix
