# App route: serves Excalidraw over the Gateway's HTTPS listener (sectionName:
# https). Plain HTTP is handled by the redirect route that stays with the Gateway
# (platform/base/cilium-gateway/http-redirect.yaml), which 301s to https.
#
# The Gateway lives in the cilium-gateway namespace (platform infra), so parentRef
# is cross-namespace — the Gateway's https listener allowedRoutes selects this
# namespace by name. The backendRef stays in-namespace, so no ReferenceGrant is
# needed. Reach it at https://draw.rosenvold.tech.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: excalidraw
  namespace: excalidraw
  # Auto-register on the homepage dashboard. homepage needs an explicit href for
  # Gateway API HTTPRoutes; the public host is fixed, so hardcode it.
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Excalidraw
    gethomepage.dev/description: Whiteboard
    gethomepage.dev/group: Tenants
    gethomepage.dev/icon: excalidraw.png
    gethomepage.dev/href: "https://draw.rosenvold.tech"
    # Pod label here is `app=excalidraw`, not the homepage default
    # `app.kubernetes.io/name=excalidraw` — override so the status dot resolves.
    gethomepage.dev/pod-selector: "app=excalidraw"
spec:
  parentRefs:
    - name: cilium-gw
      namespace: cilium-gateway
      sectionName: https
  hostnames:
    - draw.rosenvold.tech
  rules:
    - backendRefs:
        - name: excalidraw
          port: 80
