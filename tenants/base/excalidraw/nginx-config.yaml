# Non-root nginx config for Excalidraw. The stock nginx config sets `user nginx`
# and a pid/temp paths under /var/run + /var/cache (root-owned), which a non-root
# pod can't write — so it can't satisfy the restricted PodSecurity profile. This
# replacement drops the `user` directive, listens on the unprivileged port 8080
# (no NET_BIND_SERVICE needed), and relocates pid + temp dirs under /tmp so uid
# 1000 can write them. SPA fallback to index.html for client-side routing.
apiVersion: v1
kind: ConfigMap
metadata:
  name: excalidraw-nginx
  namespace: excalidraw
data:
  nginx.conf: |
    worker_processes auto;
    pid /tmp/nginx.pid;
    error_log /dev/stderr warn;
    events {
      worker_connections 1024;
    }
    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;
      access_log /dev/stdout;
      client_body_temp_path /tmp/client_temp;
      proxy_temp_path /tmp/proxy_temp;
      fastcgi_temp_path /tmp/fastcgi_temp;
      uwsgi_temp_path /tmp/uwsgi_temp;
      scgi_temp_path /tmp/scgi_temp;
      sendfile on;
      server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;
        location / {
          try_files $uri $uri/ /index.html;
        }
      }
    }
